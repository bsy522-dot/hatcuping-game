<script>
'use strict';
// ===== CANVAS SETUP =====
const C=document.getElementById('c');
const X=C.getContext('2d');
let gameMuted=false;
const muteBtn=document.getElementById('muteBtn');
muteBtn.addEventListener('click',()=>{
  gameMuted=!gameMuted;
  if(typeof AM!=='undefined'){AM.init();if(AM.isMuted()!==gameMuted)AM.toggleMute()}
  muteBtn.textContent=gameMuted?'🔇 음소거':'🔊 소리';
});

const W=420,H=750;
function resizeCanvas(){
  const dpr=window.devicePixelRatio||1;
  const maxW=window.innerWidth,maxH=window.innerHeight;
  const scale=Math.min(maxW/W,maxH/H);
  const cssW=Math.floor(W*scale),cssH=Math.floor(H*scale);
  C.style.width=cssW+'px';C.style.height=cssH+'px';
  C.width=Math.floor(W*scale*dpr);C.height=Math.floor(H*scale*dpr);
  X.setTransform(scale*dpr,0,0,scale*dpr,0,0);
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);
window.addEventListener('orientationchange',()=>setTimeout(resizeCanvas,200));
let fOK=false;setTimeout(()=>fOK=true,1200);
function FN(s){return s+'px '+(fOK?'"Jua",':'')+'sans-serif'}

// ===== IMAGE LOADER =====
const IM={};let iL=0,iT=0;
function lI(n,s){if(!s)return;iT++;const i=new Image();i.onload=()=>{iL++;IM[n]=i};i.onerror=()=>{iL++};i.src=s}
// Character sprites
lI('rs',ROMI_S);lI('rp',ROMI_P);lI('rf',ROMI_F);

// ===== HELPERS =====
function heart(c,x,y,s,col){c.save();c.translate(x,y);c.scale(s/16,s/16);c.fillStyle=col;c.beginPath();c.moveTo(0,-4);c.bezierCurveTo(-8,-14,-18,-4,-8,4);c.lineTo(0,12);c.moveTo(0,-4);c.bezierCurveTo(8,-14,18,-4,8,4);c.lineTo(0,12);c.fill();c.restore()}
function rr(c,x,y,w,h,r,f,s){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();if(f){c.fillStyle=f;c.fill()}if(s){c.strokeStyle=s;c.lineWidth=2;c.stroke()}}
function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function lerp(a,b,t){return a+(b-a)*t}

// ===== AUDIO MANAGER (Web Audio API) =====
const AM=(()=>{
  let ctx,muted=false;
  const init=()=>{if(ctx)return;try{ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}};
  const resume=()=>{if(ctx&&ctx.state==='suspended')ctx.resume()};
  const n=(f,d,t,vol=0.15,type='square')=>{if(!ctx||muted)return;try{const o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type;o.frequency.setValueAtTime(f,ctx.currentTime+t);g.gain.setValueAtTime(vol,ctx.currentTime+t);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+d);o.connect(g);g.connect(ctx.destination);
    o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+d)}catch(e){}};
  const noise=(d,t,vol=0.08)=>{if(!ctx||muted)return;try{const buf=ctx.createBuffer(1,ctx.sampleRate*d,ctx.sampleRate);
    const data=buf.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1);
    const s=ctx.createBufferSource(),g=ctx.createGain();s.buffer=buf;g.gain.setValueAtTime(vol,ctx.currentTime+t);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+t+d);s.connect(g);g.connect(ctx.destination);
    s.start(ctx.currentTime+t);s.stop(ctx.currentTime+t+d)}catch(e){}};
  return{
    init,resume,toggleMute:()=>{muted=!muted;return muted},isMuted:()=>muted,
    battleStart:()=>{n(330,.08,0,.12);n(440,.08,.08,.12);n(550,.08,.16,.12);n(660,.15,.24,.15);n(880,.2,.36,.12,'sawtooth')},
    attack:()=>{n(400,.05,0,.12,'sawtooth');n(600,.05,.04,.12,'sawtooth');n(800,.08,.08,.15,'sawtooth');noise(.1,.06,.06)},
    skill:()=>{n(523,.08,0,.1,'sine');n(659,.08,.07,.1,'sine');n(784,.08,.14,.12,'sine');n(1047,.15,.21,.14,'sine');n(1318,.12,.3,.08,'triangle')},
    enemyAttack:()=>{n(300,.06,0,.1,'sawtooth');n(200,.08,.06,.12,'sawtooth');noise(.12,.04,.08)},
    damage:()=>{n(200,.06,0,.1,'square');n(150,.08,.05,.08,'square');noise(.08,.02,.06)},
    captureOk:()=>{n(523,.1,0,.1,'sine');n(659,.1,.1,.1,'sine');n(784,.1,.2,.12,'sine');n(1047,.2,.3,.15,'sine')},
    captureFail:()=>{n(400,.1,0,.1,'square');n(350,.1,.1,.1,'square');n(300,.15,.2,.08,'square')},
    levelUp:()=>{n(523,.1,0,.1,'triangle');n(659,.1,.1,.1,'triangle');n(784,.1,.2,.12,'triangle');n(1047,.1,.3,.14,'triangle');n(1318,.2,.4,.12,'sine');n(1568,.25,.55,.1,'sine')},
    victory:()=>{n(523,.12,0,.1);n(659,.12,.1,.1);n(784,.12,.2,.12);n(1047,.15,.3,.14);n(784,.1,.45,.1,'triangle');n(1047,.1,.55,.12,'triangle');n(1318,.2,.65,.14,'triangle')},
    menuClick:()=>{n(800,.04,0,.08,'sine');n(1200,.04,.03,.06,'sine')},
    step:()=>{noise(.04,0,.03)},
    fireRescue:()=>{n(200,.15,0,.1,'sawtooth');n(300,.15,.1,.1,'sawtooth');n(400,.15,.2,.12,'sawtooth');noise(.2,.1,.05);n(523,.2,.4,.12,'sine');n(659,.15,.5,.1,'sine');n(784,.2,.6,.14,'sine')}
  }
})();

// Pre-render tiles with improved quality
const tileCanvas={};
function genTiles(){
  const tiles=[
    // 0: grass - detailed with blades
    [0,'#6EB844',c=>{
      c.fillStyle='#78C34E';for(let i=0;i<6;i++){c.beginPath();c.arc(rng(4,T-4),rng(4,T-4),rng(1,3),0,Math.PI*2);c.fill()}
      c.strokeStyle='rgba(90,158,58,0.3)';c.lineWidth=1;for(let i=0;i<3;i++){const x=rng(5,T-5);c.beginPath();c.moveTo(x,T);c.quadraticCurveTo(x+rng(-3,3),T-rng(6,12),x+rng(-2,2),T-rng(10,16));c.stroke()}
    }],
    // 1: path
    [1,'#C9A96E',c=>{c.strokeStyle='rgba(0,0,0,0.05)';c.lineWidth=1;c.strokeRect(1,1,T-2,T-2);c.fillStyle='rgba(180,150,100,0.3)';c.beginPath();c.arc(rng(8,T-8),rng(8,T-8),rng(2,4),0,Math.PI*2);c.fill()}],
    // 2: tree
    [2,'#6EB844',c=>{c.fillStyle='#5D4037';c.fillRect(T/2-3,T/2,6,T/2);c.fillStyle='#2E7D32';c.beginPath();c.arc(T/2,T/2-2,12,0,Math.PI*2);c.fill();c.fillStyle='#388E3C';c.beginPath();c.arc(T/2-5,T/2+2,7,0,Math.PI*2);c.fill();c.fillStyle='rgba(30,80,30,0.3)';c.beginPath();c.arc(T/2+3,T/2-6,5,0,Math.PI*2);c.fill()}],
    // 3: wall - castle stone pattern
    [3,'#888',c=>{
      c.fillStyle='#777';c.fillRect(0,0,T,T);
      c.strokeStyle='#555';c.lineWidth=1;
      for(let row=0;row<4;row++){
        const off=row%2===0?0:T/4;
        for(let col=-1;col<3;col++){
          const bx=col*(T/2)+off,by=row*(T/4);
          c.strokeRect(bx,by,T/2,T/4);
          c.fillStyle='rgba('+(120+rng(-10,10))+','+(120+rng(-10,10))+','+(120+rng(-10,10))+',0.3)';
          c.fillRect(bx+1,by+1,T/2-2,T/4-2);
        }
      }
    }],
    // 4: water
    [4,'#2196F3',c=>{c.fillStyle='rgba(255,255,255,0.15)';c.beginPath();c.arc(T/3,T/3,4,0,Math.PI*2);c.fill();c.beginPath();c.arc(T*2/3,T*2/3,3,0,Math.PI*2);c.fill()}],
    // 5: flower
    [5,'#6EB844',c=>{const fc=['#FF69B4','#FFD700','#FF6347','#BA68C8','#87CEEB'];for(let i=0;i<4;i++){c.fillStyle=fc[i%fc.length];c.beginPath();c.arc(8+rng(0,24),8+rng(0,24),rng(2,3),0,Math.PI*2);c.fill();c.fillStyle='#FFE082';c.beginPath();c.arc(8+rng(0,24),8+rng(0,24),1,0,Math.PI*2);c.fill()}}],
    // 6: dark floor
    [6,'#2a1540',c=>{c.fillStyle='#351a50';c.fillRect(1,1,T-2,T-2);c.strokeStyle='rgba(128,0,255,0.1)';c.lineWidth=1;c.strokeRect(2,2,T-4,T-4);c.fillStyle='rgba(80,0,160,0.08)';c.beginPath();c.arc(rng(8,T-8),rng(8,T-8),rng(3,6),0,Math.PI*2);c.fill()}],
    // 7: dark wall
    [7,'#1a0a2e',c=>{c.fillStyle='#150830';c.fillRect(0,0,T,T);c.strokeStyle='#2a1540';c.lineWidth=1;for(let row=0;row<4;row++){const off=row%2===0?0:T/4;for(let col=-1;col<3;col++){c.strokeRect(col*(T/2)+off,row*(T/4),T/2,T/4)}}}],
    // 8: castle floor - improved stone pattern
    [8,'#C8B6E2',c=>{
      c.fillStyle='#D4C1EC';c.fillRect(0,0,T,T);
      c.strokeStyle='rgba(0,0,0,0.08)';c.lineWidth=1;
      c.strokeRect(0,0,T/2,T/2);c.strokeRect(T/2,0,T/2,T/2);
      c.strokeRect(T/4,T/2,T/2,T/2);
      c.fillStyle='rgba(255,255,255,0.06)';c.fillRect(2,2,T/2-4,T/2-4);
    }],
    // 9: castle wall - improved
    [9,'#9988AA',c=>{
      c.fillStyle='#AA99BB';c.fillRect(0,0,T,T);
      c.strokeStyle='#776688';c.lineWidth=1;
      for(let row=0;row<4;row++){const off=row%2===0?0:T/4;for(let col=-1;col<3;col++){c.strokeRect(col*(T/2)+off,row*(T/4),T/2,T/4)}}
      c.fillStyle='rgba(255,255,255,0.08)';c.fillRect(0,0,T,2);
    }],
    // 10: door
    [10,'#8B6914',c=>{c.fillStyle='#A0792C';c.fillRect(T/4,0,T/2,T);c.fillStyle='#FFD700';c.beginPath();c.arc(T/2+5,T/2,2,0,Math.PI*2);c.fill();c.strokeStyle='#6B5310';c.lineWidth=1;c.strokeRect(T/4+2,2,T/2-4,T-4)}],
    // 11: npc spot
    [11,'#C8B6E2',null],
    // 12: tall grass
    [12,'#6EB844',c=>{c.fillStyle='#5A9E3A';for(let i=0;i<6;i++){const x=rng(2,T-6);const h=rng(12,22);c.fillRect(x,T-h,2,h)}c.fillStyle='#4A8E2A';for(let i=0;i<3;i++){const x=rng(4,T-8);c.fillRect(x,T-rng(8,16),3,rng(8,16))}}],
  ];
  tiles.forEach(([id,bg,fn])=>{
    const cv=document.createElement('canvas');cv.width=T;cv.height=T;
    const c=cv.getContext('2d');c.fillStyle=bg;c.fillRect(0,0,T,T);
    if(fn)fn(c);tileCanvas[id]=cv;
  });
}

function mkCh(key,lv){
  const d=CHARS[key];if(!d)return null;
  const mhp=d.hp+lv*5;
  return{key,n:d.n,ic:d.ic,type:d.type,boss:d.boss||false,level:lv,mhp,hp:mhp,
    a:d.atk+Math.floor(lv*2),d:d.def+Math.floor(lv*1.3),spd:d.spd+lv,exp:0,
    sk:d.sk.map(s=>({...s}))};
}

function saveGame(){
  try{
    const sv={party:party.map(p=>({key:p.key,level:p.level,hp:p.hp,mhp:p.mhp,a:p.a,d:p.d,spd:p.spd,exp:p.exp,sk:p.sk})),
      bag:{...bag},ch:storyFlags.ch,curMap,px:P.x,py:P.y};
    localStorage.setItem('hatcuping_rpg_save',JSON.stringify(sv));
  }catch(e){}
}
function loadGame(){
  try{
    const raw=localStorage.getItem('hatcuping_rpg_save');
    if(!raw)return false;
    const sv=JSON.parse(raw);
    party=sv.party.map(p=>{const ch=mkCh(p.key,p.level);if(!ch)return null;ch.hp=p.hp;ch.mhp=p.mhp;ch.a=p.a;ch.d=p.d;ch.exp=p.exp;ch.sk=p.sk;return ch}).filter(Boolean);
    bag=sv.bag||{hearts:5};storyFlags.ch=sv.ch||0;
    enterMap(sv.curMap||'castle_room',sv.px,sv.py);
    return true;
  }catch(e){return false}
}
function hasSave(){try{return !!localStorage.getItem('hatcuping_rpg_save')}catch(e){return false}}
function deleteSave(){try{localStorage.removeItem('hatcuping_rpg_save')}catch(e){}}

// Story scene: {bg:'bg_key', char:'sprite_key', sp:'Speaker', tx:'Text'}
// bg: 'bg_castle','bg_corridor','bg_fountain','bg_roof','bg_forest','bg_deep','bg_dark'
// char: IM sprite key shown centered 200px tall on background
function goStory(arr,cb){stQ=arr;stI=0;stTx='';stDn=false;stCb=cb;doTrans('story',()=>typeSt())}
function typeSt(){const s=stQ[stI];if(!s)return;stTx='';stDn=false;let i=0;const tx=s.tx;
  clearInterval(stTm);stTm=setInterval(()=>{if(i<tx.length)stTx=tx.slice(0,++i);else{stDn=true;clearInterval(stTm)}},22)}
function advSt(){if(!stDn){clearInterval(stTm);stTx=stQ[stI].tx;stDn=true;return}
  stI++;if(stI<stQ.length)typeSt();else{clearInterval(stTm);if(stCb)stCb()}}
function doTrans(s,cb){trD=1;trNx=()=>{scr=s;if(cb)cb();trD=-1}}

// ===== MAP SYSTEM =====
function enterMap(mapName,px,py){
  curMap=mapName;mapData=MAPS[mapName];
  if(party.length>0)try{saveGame()}catch(e){}
  if(!mapData)return;
  P.x=px||mapData.startX||1;P.y=py||mapData.startY||1;
  P.tx=P.x;P.ty=P.y;P.vx=P.x;P.vy=P.y;P.moving=false;
  doTrans('map');
}

function tryMove(dir){
  if(P.moving||dlg||menuOpen||!mapData)return;
  P.dir=dir;
  let nx=P.x,ny=P.y;
  if(dir==='up')ny--;if(dir==='down')ny++;if(dir==='left')nx--;if(dir==='right')nx++;
  if(nx<0||nx>=mapData.w||ny<0||ny>=mapData.h)return;
  const tile=mapData.tiles[ny][nx];
  if(!TILE_WALK[tile])return;
  const npc=mapData.npcs.find(n=>n.x===nx&&n.y===ny);
  if(npc)return;
  P.tx=nx;P.ty=ny;P.moving=true;P.mt=0;AM.step();
}

function interact(){
  if(dlg||P.moving||menuOpen||!mapData)return;
  if(interactCD>0)return;
  interactCD=15;
  let fx=P.x,fy=P.y;
  if(P.dir==='up')fy--;if(P.dir==='down')fy++;if(P.dir==='left')fx--;if(P.dir==='right')fx++;
  const npc=mapData.npcs.find(n=>n.x===fx&&n.y===fy);
  if(npc){
    if(npc.cond){
      const ch=parseInt(npc.cond.replace('ch',''));
      if(isNaN(ch)||storyFlags.ch!==ch)return;
    }
    dlg={lines:npc.dialog,name:npc.name,idx:0,npc};
    if(npc.cond){
      const ch=parseInt(npc.cond.replace('ch',''));
      if(!isNaN(ch)&&storyFlags.ch===ch){storyFlags.ch=Math.min(ch+1,99);saveGame()}
    }
    return;
  }
  const warp=mapData.warps.find(w=>w.x===P.x&&w.y===P.y);
  if(warp){enterMap(warp.map,warp.tx,warp.ty);return}
  const tile=mapData.tiles[P.y][P.x];
  if(tile===10){
    const warp2=mapData.warps.find(w=>w.x===P.x&&w.y===P.y);
    if(warp2)enterMap(warp2.map,warp2.tx,warp2.ty);
  }
}

function updateMap(){
  if(interactCD>0)interactCD--;
  if(dlg||menuOpen||!mapData)return;
  if(!P.moving){
    if(keys.ArrowUp||keys.w||tU)tryMove('up');
    else if(keys.ArrowDown||keys.s||tDn)tryMove('down');
    else if(keys.ArrowLeft||keys.a||tL)tryMove('left');
    else if(keys.ArrowRight||keys.d||tR)tryMove('right');
  }
  if(P.moving){
    P.mt+=16;
    const prog=clamp(P.mt/MS,0,1);
    const ease=1-(1-prog)*(1-prog);
    P.vx=lerp(P.x,P.tx,ease);
    P.vy=lerp(P.y,P.ty,ease);
    P.wf=prog;
    if(prog>0.2&&prog<0.8&&Math.random()<0.2){
      parts.push({x:P.vx*T+T/2+rng(-6,6),y:P.vy*T+T,vx:(Math.random()-0.5),vy:-Math.random()*0.5,l:0.4,s:rng(2,3),c:'rgba(150,140,120,0.3)'});
    }
    if(prog>=1){
      P.x=P.tx;P.y=P.ty;P.vx=P.x;P.vy=P.y;P.moving=false;P.wf=0;
      const tile=mapData.tiles[P.y][P.x];
      if(tile===10){
        const warp=mapData.warps.find(w=>w.x===P.x&&w.y===P.y);
        if(warp){enterMap(warp.map,warp.tx,warp.ty);return}
      }
      if(party.length>0){
        const encRate=TILE_ENCOUNTER[tile];
        if(encRate&&Math.random()<encRate&&mapData.encounters.length>0){
          const enc=mapData.encounters[rng(0,mapData.encounters.length-1)];
          const lv=rng(enc.minLv,enc.maxLv);
          startBattle(mkCh(enc.key,lv),false);
        }
      }
    }
  }
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.l-=0.02});
  parts=parts.filter(p=>p.l>0);
  if(keys[' ']||keys.Enter||tA){
    if(dlg)advDlg();
    else interact();
    keys[' ']=false;keys.Enter=false;tA=false;
  }
  if(keys.Escape||keys.m||keys.M){
    if(menuOpen){menuOpen=false}else if(!dlg&&!P.moving){menuOpen=true}
    keys.Escape=false;keys.m=false;keys.M=false;
  }
}

// ===== BATTLE SYSTEM =====
function startBattle(enemy,isBoss){
  const myChar=party[0]?{...party[0]}:mkCh('hatchu',5);
  bat={en:enemy,my:myChar,turn:'player',log:enemy.ic+' '+enemy.n+' 등장!',
    phase:'select',selIdx:0,over:false,isBoss,catching:null,
    enShake:0,myShake:0,dmgNums:[],anim:0};
  AM.battleStart();doTrans('battle');
}

function batAction(action){
  if(!bat||bat.over||bat.turn!=='player')return;
  if(action==='attack'){
    bat.turn='animating';AM.attack();
    const sk=bat.my.sk[0];
    const d=calcDmg(bat.my,bat.en,sk);
    bat.en.hp-=d;bat.enShake=15;
    bat.log=bat.my.n+'의 '+sk.n+'! '+d+' 데미지!';
    bat.dmgNums.push({v:d,x:300,y:100,t:40,heal:false});
    setTimeout(()=>{if(bat&&bat.en.hp<=0)batWin();else if(bat)enemyTurn()},600);
  }
  else if(action==='skill'){bat.phase='skill';bat.selIdx=0}
  else if(action==='capture'){
    if(bat.isBoss){bat.log='보스는 포획 불가!';return}
    if(bag.hearts<=0){bat.log='하트가 없어!';return}
    bag.hearts--;bat.turn='animating';bat.catching='...';
    const rate=clamp(80-(bat.en.hp/bat.en.mhp)*55,25,85);
    setTimeout(()=>{
      if(!bat)return;
      if(Math.random()*100<rate){
        bat.catching=bat.en.n+' 포획 성공!';bat.over=true;AM.captureOk();
        party.push(mkCh(bat.en.key,bat.en.level));
        setTimeout(()=>{if(bat)bat.catching=null;batEnd()},1200);
      } else {
        bat.catching='빠져나갔다!';AM.captureFail();
        setTimeout(()=>{if(bat)bat.catching=null;enemyTurn()},800);
      }
    },1000);
  }
  else if(action==='run'){
    if(bat.isBoss){bat.log='보스에게서 도망칠 수 없다!';return}
    if(Math.random()<0.8){batEnd()}
    else{bat.log='도망 실패!';bat.turn='animating';setTimeout(()=>{if(bat)enemyTurn()},400)}
  }
}

function useSkill(idx){
  if(!bat||bat.turn!=='player'||idx<0||idx>=bat.my.sk.length)return;
  const sk=bat.my.sk[idx];if(!sk)return;
  bat.turn='animating';bat.phase='select';AM.skill();
  if(sk.pw<0){
    const h=Math.abs(sk.pw);bat.my.hp=Math.min(bat.my.mhp,bat.my.hp+h);
    bat.log=sk.n+'! HP +'+h;
    bat.dmgNums.push({v:h,x:100,y:220,t:40,heal:true});
    setTimeout(()=>{if(bat)enemyTurn()},600);
  } else if(sk.tp==='shield'){
    bat.log=sk.n+'! 방어력 상승!';bat.my.d+=3;
    setTimeout(()=>{if(bat)enemyTurn()},600);
  } else {
    const d=calcDmg(bat.my,bat.en,sk);bat.en.hp-=d;bat.enShake=15;
    bat.log=sk.n+'! '+d+' 데미지!';
    bat.dmgNums.push({v:d,x:300,y:100,t:40,heal:false});
    setTimeout(()=>{if(bat&&bat.en.hp<=0)batWin();else if(bat)enemyTurn()},600);
  }
}

function calcDmg(atk,def,sk){
  let d=Math.max(1,atk.a+sk.pw-Math.floor(def.d*0.4))+rng(0,4);
  let eff=0;
  if(sk.tp==='love'&&def.type==='dark'){d=Math.floor(d*1.5);eff=1}
  if(sk.tp==='ice'&&def.type==='fire'){d=Math.floor(d*1.5);eff=1}
  if(sk.tp==='fire'&&def.type==='ice'){d=Math.floor(d*1.5);eff=1}
  if(sk.tp==='dark'&&def.type==='love'){d=Math.floor(d*0.7);eff=-1}
  if(sk.tp==='fire'&&def.type==='love'){d=Math.floor(d*0.7);eff=-1}
  if(sk.tp==='ice'&&def.type==='love'){d=Math.floor(d*0.7);eff=-1}
  if(eff!==0)typeEffText={msg:eff>0?'효과가 좋다!':'효과가 약하다...',t:60,good:eff>0};
  return d;
}

function enemyTurn(){
  if(!bat||bat.over)return;AM.enemyAttack();
  const sk=bat.en.sk[rng(0,bat.en.sk.length-1)];
  if(sk.pw<0){
    const h=Math.abs(sk.pw);bat.en.hp=Math.min(bat.en.mhp,bat.en.hp+h);
    bat.log=bat.en.n+'의 '+sk.n+'! HP+'+h;
    bat.dmgNums.push({v:h,x:300,y:100,t:40,heal:true});
  } else {
    const d=calcDmg(bat.en,bat.my,sk);bat.my.hp-=d;bat.myShake=15;AM.damage();
    bat.log=bat.en.n+'의 '+sk.n+'! '+d+' 데미지!';
    bat.dmgNums.push({v:d,x:100,y:220,t:40,heal:false});
  }
  setTimeout(()=>{
    if(!bat)return;
    if(bat.my.hp<=0){bat.over=true;bat.log='패배...';
      setTimeout(()=>{if(party[0]){party[0].hp=party[0].mhp}if(bat)batEnd()},4000)}
    else{bat.turn='player';bat.phase='select';bat.selIdx=0}
  },500);
}

function batWin(){
  if(!bat)return;
  bat.over=true;AM.victory();
  const exp=bat.en.level*12+15;
  if(party[0]){
    party[0].exp+=exp;
    party[0].hp=Math.max(1,bat.my.hp);
    // Post-battle heal 30%
    const healAmt=Math.floor(party[0].mhp*0.3);
    party[0].hp=Math.min(party[0].mhp,party[0].hp+healAmt);
    if(party[0].exp>=party[0].level*25){
      party[0].level++;party[0].mhp+=6;party[0].hp=party[0].mhp;party[0].a+=2;party[0].d+=1;party[0].exp=0;AM.levelUp();
      bat.log='Lv.'+party[0].level+'! '+bat.en.n+' 격파!';
    } else {
      bat.log=bat.en.n+' 격파! EXP+'+exp;
    }
  }
  if(bat.isBoss){
    bat.log='트러핑 격파! 사랑이 이겼다!';
    setTimeout(()=>{
      bat=null;
      goStory([
        {bg:'bg_forest',char:'hf',sp:'하츄핑 💗',tx:'로미... 고마워!\n불 속에서 나를 구해줬잖아!\n네 덕분에 용기를 얻었어!'},
        {bg:'bg_castle',char:'lip',sp:'리암 왕자',tx:'트러핑... 미안해.\n내가 너를 이해하지 못했어.\n다시 시작하자.'},
        {bg:'bg_castle',char:'tp',sp:'트러핑',tx:'리암... 정말이야?\n나를... 다시 받아줄 거야?'},
        {bg:'bg_fountain',char:null,sp:'',tx:'하츄핑의 눈물이 떨어지는 순간\n트러핑의 모든 저주가 풀렸어요.\n\n트러핑도 리암 왕자와 다시 만나\n오해를 풀고 화해했습니다.'},
        {bg:'bg_fountain',char:'hf',sp:'하츄핑 💗',tx:'싸우거나 속상한 일이 있어도\n화해하면 돼.\n로미와 함께 있으면 행복해!'},
        {bg:'bg_fountain',char:null,sp:'',tx:'사랑이 세상을 구했습니다.\n\n로미와 하츄핑은 진정한 짝꿍이 되어\n새로운 모험을 떠납니다...'},
      ],()=>doTrans('ending'));
    },2000);
    return;
  }
  setTimeout(()=>{if(bat)batEnd()},2000);
}

function batEnd(){if(!bat&&scr!=='battle')return;bat=null;doTrans('map')}

// ===== UPDATE =====
function update(){
  t+=0.02;ticks++;
  if(typeEffText){typeEffText.t--;if(typeEffText.t<=0)typeEffText=null}
  if(trD>0){trA=Math.min(1,trA+0.05);if(trA>=1&&trNx){trNx();trNx=null}}
  if(trD<0){trA=Math.max(0,trA-0.05);if(trA<=0)trD=0}
  if(scr==='map')updateMap();
  if(scr==='battle'&&bat){
    bat.anim+=0.05;
    if(bat.enShake>0)bat.enShake--;
    if(bat.myShake>0)bat.myShake--;
    bat.dmgNums.forEach(d=>d.t--);
    bat.dmgNums=bat.dmgNums.filter(d=>d.t>0);
  }
}

// ===== GRADIENT CACHE =====
const _bgGrad={};
function getBgGrad(type){
  if(_bgGrad[type])return _bgGrad[type];
  const g=X.createLinearGradient(0,0,0,H);
  if(type==='title'){g.addColorStop(0,'#FFB8D4');g.addColorStop(0.3,'#FF6B9D');g.addColorStop(0.6,'#E84B7A');g.addColorStop(1,'#C2185B')}
  else if(type==='sunset'){g.addColorStop(0,'#FF9A8B');g.addColorStop(0.35,'#FF6B9D');g.addColorStop(0.7,'#FFB8D4');g.addColorStop(1,'#FFDEE9')}
  _bgGrad[type]=g;return g;
}
let _storyDimGrad;
function getStoryDimGrad(){
  if(!_storyDimGrad){
    _storyDimGrad=X.createLinearGradient(0,H*0.62,0,H);
    _storyDimGrad.addColorStop(0,'transparent');
    _storyDimGrad.addColorStop(0.12,'rgba(0,0,0,0.75)');
    _storyDimGrad.addColorStop(1,'rgba(0,0,0,0.92)');
  }
  return _storyDimGrad;
}
let _cachedRect=null,_rectFrame=-1;
function getCachedRect(){if(_rectFrame!==ticks){_cachedRect=C.getBoundingClientRect();_rectFrame=ticks}return _cachedRect}

// ===== DRAW ENV BACKGROUND =====
function drawEnvBG(key){
  const img=IM[key];
  if(img){
    const iw=img.width,ih=img.height;
    const scale=Math.max(W/iw,H/ih);
    const dw=iw*scale,dh=ih*scale;
    X.drawImage(img,(W-dw)/2,(H-dh)/2,dw,dh);
  } else {
    X.fillStyle='#1a0a2e';X.fillRect(0,0,W,H);
  }
}

// Draw character sprite centered, 200px tall
function drawCharSprite(sprKey,yOffset){
  if(!sprKey)return;
  const img=IM[sprKey];
  if(!img)return;
  const charH=200;
  const charW=img.width*(charH/img.height);
  const cx=W/2-charW/2;
  const cy=(H*0.28)-(charH/2)+(yOffset||0);
  const bob=Math.sin(t*1.5)*4;
  X.drawImage(img,cx,cy+bob,charW,charH);
}

function renderMap(){
  if(!mapData)return;
  const isDark=curMap==='laminne';
  X.fillStyle=isDark?'#0d0520':'#4a8c28';X.fillRect(0,0,W,H);
  const camX=P.vx*T+T/2-W/2;
  const camY=P.vy*T+T/2-H/2.5;
  X.save();X.translate(-camX,-camY);
  for(let y=0;y<mapData.h;y++)for(let x=0;x<mapData.w;x++){
    const tile=mapData.tiles[y][x];
    const cv=tileCanvas[tile];
    if(cv)X.drawImage(cv,x*T,y*T);
    if(tile===12){
      const sway=Math.sin(t*2+x*0.5+y*0.3)*2;
      X.fillStyle='rgba(90,158,58,0.4)';
      X.fillRect(x*T+T/2-4+sway,y*T+T-14,3,14);
      X.fillRect(x*T+T/2+4+sway,y*T+T-12,3,12);
    }
  }
  // NPCs
  const sprMap={hk:'hk',kk:'kk',bk:'bk',ba:'ba',ch:'ch',hs:'hm',ts:'ts',rf:'rf',st:'st',li:'li',la:'la'};
  mapData.npcs.forEach(n=>{
    if(n.cond){const ch=parseInt(n.cond.replace('ch',''));if(isNaN(ch)||storyFlags.ch>ch+1)return}
    const nx=n.x*T,ny=n.y*T;
    const bob=Math.sin(t*2+n.x)*2;
    const img=n.spr?IM[sprMap[n.spr]]:null;
    if(img){
      const iw=Math.min(T-4,img.width*(T/img.height));
      X.drawImage(img,nx+T/2-iw/2,ny+bob-4,iw,T);
    } else {
      X.fillStyle=isDark?'#6a3d7d':'#c9a96e';
      X.beginPath();X.arc(nx+T/2,ny+T/2+bob,T/3,0,Math.PI*2);X.fill();
      X.fillStyle='#fff';X.font=FN(10);X.textAlign='center';X.fillText(n.name,nx+T/2,ny+T/2+bob+3);
    }
    if(n.cond){const ch=parseInt(n.cond.replace('ch',''));
      if(!isNaN(ch)&&storyFlags.ch===ch){X.fillStyle='#FFD700';X.font='bold '+FN(14);X.textAlign='center';X.fillText('!',nx+T/2,ny-8+Math.sin(t*3)*3)}}
  });
  // Player
  const px=P.vx*T,py=P.vy*T;
  X.save();X.translate(px+T/2,py+T/2);
  if(P.moving){X.translate(0,Math.sin(P.wf*Math.PI*4)*2);X.rotate(Math.sin(P.wf*Math.PI*2)*0.04)}
  if(P.dir==='left')X.scale(-1,1);
  X.fillStyle='rgba(0,0,0,0.12)';X.beginPath();X.ellipse(0,T/2-2,T/3,4,0,0,Math.PI*2);X.fill();
  if(IM.rs){const rw=PW*1.2,rh=PH*1.2;X.drawImage(IM.rs,-rw/2,-rh/2-8,rw,rh)}
  X.restore();
  parts.forEach(p=>{X.globalAlpha=p.l;X.fillStyle=p.c;X.beginPath();X.arc(p.x,p.y,p.s*p.l,0,Math.PI*2);X.fill()});
  X.globalAlpha=1;
  X.restore();
  // HUD
  rr(X,8,8,220,32,12,'rgba(0,0,0,0.6)');
  X.fillStyle='#fff';X.font=FN(14);X.textAlign='left';
  const p0=party[0];
  if(p0){X.save();X.shadowColor='rgba(0,0,0,0.7)';X.shadowBlur=4;X.shadowOffsetX=1;X.shadowOffsetY=1;X.fillText(p0.ic+' '+p0.n+' Lv.'+p0.level+' HP'+Math.max(0,p0.hp)+'/'+p0.mhp,16,28);X.restore()}
  else X.fillText('이모션 왕국',16,28);
  rr(X,W-80,8,72,32,12,'rgba(0,0,0,0.6)');
  X.fillStyle='#FF6B9D';X.save();X.shadowColor='rgba(0,0,0,0.7)';X.shadowBlur=4;X.fillText('💗x'+bag.hearts,W-72,28);X.restore();
  // Party button
  rr(X,W-80,46,72,60,10,'rgba(0,0,0,0.5)');
  X.fillStyle='#fff';X.font=FN(14);X.textAlign='center';X.fillText('파티',W-44,64);
  btns=[{x:W-80,y:46,w:72,h:60,id:'party'}];

  rr(X,8,46,36,28,10,'rgba(0,0,0,0.5)');

  // Dialog
  if(dlg){
    rr(X,10,H-170,W-20,120,14,'rgba(0,0,0,0.88)','rgba(255,107,157,0.4)');

  }
  // Touch D-pad (70px touch targets)

    X.strokeStyle='rgba(255,107,157,0.3)';X.lineWidth=2;X.stroke();

  // Party panel
  if(menuOpen){
    rr(X,20,60,W-40,H-120,16,'rgba(0,0,0,0.92)','rgba(255,107,157,0.3)');

    party.forEach((p,i)=>{

      rr(X,30,y,W-60,60,10,'rgba(255,255,255,0.35)','rgba(255,255,255,0.3)');
      const img=IM[sMap[p.key]];
      if(img)X.drawImage(img,40,y+5,45,45);
      X.fillStyle='#fff';X.font=FN(13);X.textAlign='left';
      X.fillText(p.ic+' '+p.n+(i===0?' (리더)':''),95,y+20);
      X.fillStyle='rgba(255,255,255,0.85)';X.font=FN(14);
      X.fillText('Lv.'+p.level+' HP'+Math.max(0,p.hp)+'/'+p.mhp+' ATK'+p.a+' DEF'+p.d,95,y+40);
      const hpRatio=Math.max(0,p.hp)/p.mhp;const barW=W-130;
      X.fillStyle='rgba(255,255,255,0.15)';X.fillRect(95,y+45,barW,5);
      X.fillStyle=hpRatio>0.5?'#4CAF50':hpRatio>0.2?'#FF9800':'#F44336';

    X.fillStyle='#fff';X.font=FN(14);X.textAlign='center';X.fillText('닫기',W/2,H-60);
    btns.push({x:W/2-60,y:H-80,w:120,h:60,id:'closeMenu'});
  }
}

function renderBattle(){
  if(!bat)return;
  const isDark=bat.en.type==='dark';
  // Environment background for battle
  if(isDark){drawEnvBG('bg_dark')} else {drawEnvBG('bg_forest')}
  X.fillStyle='rgba(0,0,0,0.15)';X.fillRect(0,H*0.38,W,H*0.17);
  X.fillStyle=isDark?'rgba(26,10,46,0.5)':'rgba(126,200,80,0.4)';
  X.fillRect(0,H*0.42,W,H*0.13);
  // Enemy
  const enSprMap={hatchu:'hm',baro:'ba',chacha:'ch',kkong:'kk',bukku:'bk',trup:'ts',trup_minion:null};
  const enImg=IM[enSprMap[bat.en.key]];
  if(enImg){
    const bob=Math.sin(bat.anim*3)*5;
    const shake=bat.enShake>0?Math.sin(bat.enShake)*5:0;
    X.globalAlpha=bat.en.hp<=0?0.3:1;
    const ew=enImg.width*(80/enImg.height);
    X.drawImage(enImg,290-ew/2+shake,80+bob,ew,80);
    X.globalAlpha=1;
  } else {
    X.fillStyle='#4A148C';X.beginPath();X.arc(290,120+Math.sin(bat.anim*3)*5,25,0,Math.PI*2);X.fill();
    X.fillStyle='#fff';X.font=FN(16);X.textAlign='center';X.fillText(bat.en.ic,290,125);
  }
  // My char
  const myImg=IM.hs||IM.rs;
  if(myImg){
    const shake=bat.myShake>0?Math.sin(bat.myShake)*5:0;
    X.globalAlpha=bat.my.hp<=0?0.3:1;
    const mw=myImg.width*(90/myImg.height);
    X.drawImage(myImg,100-mw/2+shake,200,mw,90);
    X.globalAlpha=1;
  }
  // Damage nums
  bat.dmgNums.forEach(d=>{
    if(d.t>0){X.globalAlpha=clamp(d.t/20,0,1);
      X.fillStyle=d.heal?'#44ff88':'#ff4444';X.font='bold '+FN(20);X.textAlign='center';
      X.fillText((d.heal?'+':'-')+d.v,d.x,d.y-(40-d.t)*1.5);X.globalAlpha=1}
  });
  if(typeEffText&&typeEffText.t>0){X.globalAlpha=clamp(typeEffText.t/30,0,1);
    X.fillStyle=typeEffText.good?'#FFD700':'#8888ff';X.font='bold '+FN(14);X.textAlign='center';
    X.fillText(typeEffText.msg,W/2,H*0.2);X.globalAlpha=1}
  if(bat.catching){
    X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(0,0,W,H*0.55);
    heart(X,W/2,H*0.25,20,'#FF6B9D');
    X.fillStyle='#fff';X.font='bold '+FN(16);X.textAlign='center';X.fillText(bat.catching,W/2,H*0.25+40);
  }
  // Battle UI
  X.fillStyle='#1a0a2e';X.fillRect(0,H*0.55,W,H*0.45);
  const by=H*0.56;
  [{p:bat.en,x:10},{p:bat.my,x:W/2+5}].forEach(({p,x})=>{

  });
  rr(X,10,by+60,W-20,26,8,'rgba(0,0,0,0.4)');

    X.fillStyle='rgba(255,255,255,0.7)';X.font=FN(14);X.fillText(bat.log,W/2,H*0.3+55);
    if(isDefeat){
      btns.push({x:W/2-60,y:H*0.3+60,w:120,h:30,id:'batEnd'});
      rr(X,W/2-60,H*0.3+60,120,30,12,'#888');
      X.fillStyle='#fff';X.font=FN(14);X.fillText('확인',W/2,H*0.3+80);
      btns.push({x:W/2-60,y:H*0.3+96,w:120,h:30,id:'goTitle'});

      btns.push({x:W/2-60,y:H*0.3+60,w:120,h:60,id:'batEnd'});
      rr(X,W/2-60,H*0.3+60,120,60,12,'#FF6B9D');
      X.fillStyle='#fff';X.font=FN(14);X.fillText('확인',W/2,H*0.3+78);
    }
  }
}

function render(){
  X.clearRect(0,0,W,H);
  btns=[];
  btns.push({x:W-40,y:4,w:36,h:28,id:'mute'});

  if(scr==='title'){
    // Pink gradient title
    const g=getBgGrad('title');
    X.fillStyle=g;X.fillRect(0,0,W,H);
    for(let i=0;i<10;i++){
      X.globalAlpha=0.12+Math.sin(t+i*0.7)*0.08;
      heart(X,Math.sin(t*0.3+i*1.1)*140+W/2,50+i*70,6+i,'#fff');
    }
    X.globalAlpha=1;
    const hs=1+Math.sin(t*3)*0.06;
    X.save();X.translate(W/2,120);X.scale(hs,hs);heart(X,0,0,42,'#fff');X.restore();
    X.fillStyle='#fff';X.font='bold '+FN(30);X.textAlign='center';
    X.save();X.shadowColor='rgba(0,0,0,0.4)';X.shadowBlur=8;X.shadowOffsetX=2;X.shadowOffsetY=2;
    X.fillText('사랑의 하츄핑',W/2,210);X.restore();
    X.fillStyle='rgba(255,255,255,0.8)';X.font=FN(16);X.fillText('티니핑 RPG',W/2,238);
    // Characters on top
    if(IM.rp){const im=IM.rp;const ch=220;const cw=im.width*(ch/im.height);X.drawImage(im,20,300+Math.sin(t*1.5)*6,cw,ch)}
    if(IM.hp){const im=IM.hp;const ch=160;const cw=im.width*(ch/im.height);X.drawImage(im,W/2+30,380+Math.sin(t*1.5+1)*6,cw,ch)}
    btns.push({x:W/2-80,y:580,w:160,h:46,id:'start'});
    rr(X,W/2-80,580,160,46,25,'rgba(255,255,255,0.25)','rgba(255,255,255,0.6)');
    X.fillStyle='#fff';X.font='bold '+FN(20);X.fillText('모험 시작!',W/2,610);
    if(hasSave()){
      btns.push({x:W/2-80,y:636,w:160,h:42,id:'loadSave'});
      rr(X,W/2-80,636,160,42,20,'rgba(255,255,255,0.15)','rgba(255,255,255,0.4)');
      X.fillStyle='rgba(255,255,255,0.9)';X.font='bold '+FN(16);X.fillText('이어하기',W/2,663);
    }
  }
  else if(scr==='story'){
    const s=stQ[stI];if(!s)return;
    // Environment background
    if(s.bg&&IM[s.bg]){drawEnvBG(s.bg)}
    else{const g=getBgGrad('sunset');X.fillStyle=g;X.fillRect(0,0,W,H)}
    // Character sprite 200px centered
    if(s.char)drawCharSprite(s.char,0);
    // Dark overlay for text
    const dg=getStoryDimGrad();
    X.fillStyle=dg;X.fillRect(0,H*0.58,W,H*0.42);
    if(s.sp){
      rr(X,16,H*0.68,Math.max(80,s.sp.length*11+18),26,10,'rgba(255,107,157,0.3)','rgba(255,107,157,0.5)');
      X.fillStyle='#FF6B9D';X.font='bold '+FN(14);X.textAlign='left';X.fillText(s.sp,26,H*0.68+19);
    }
    X.fillStyle='#fff';X.font=FN(18);X.textAlign='left';
    const textY=H*0.68+(s.sp?38:10);
    stTx.split('\n').forEach((l,i)=>{
      X.save();X.shadowColor='rgba(0,0,0,0.8)';X.shadowBlur=4;X.fillText(l,20,textY+i*24);X.restore();
    });
    if(stDn){
      X.globalAlpha=0.5+Math.sin(ticks*0.1)*0.4;
      X.fillStyle='#FFD700';X.font='bold '+FN(16);X.textAlign='right';
      X.fillText('▼ 터치하세요',W-16,H-14);
      X.globalAlpha=1;
    }
  }
  else if(scr==='map'){renderMap()}
  else if(scr==='battle'){renderBattle()}
  else if(scr==='ending'){
    drawEnvBG('bg_fountain');
    X.fillStyle='rgba(0,0,0,0.3)';X.fillRect(0,0,W,H);
    heart(X,W/2,80,38,'#FF6B9D');
    X.fillStyle='#fff';X.font='bold '+FN(28);X.textAlign='center';
    X.save();X.shadowColor='rgba(0,0,0,0.6)';X.shadowBlur=8;X.fillText('사랑의 하츄핑',W/2,160);X.restore();
    X.fillStyle='rgba(255,255,255,0.9)';X.font=FN(16);
    ['로미와 하츄핑의 모험은','영원히 계속됩니다...'].forEach((l,i)=>X.fillText(l,W/2,200+i*26));
    if(IM.rp){const im=IM.rp;const ch=200;const cw=im.width*(ch/im.height);X.drawImage(im,20,280+Math.sin(t*1.5)*5,cw,ch)}
    if(IM.hp){const im=IM.hp;const ch=150;const cw=im.width*(ch/im.height);X.drawImage(im,W/2+30,350+Math.sin(t*1.5+1)*5,cw,ch)}
    X.fillStyle='#FFD644';X.font='bold '+FN(20);X.save();X.shadowColor='rgba(0,0,0,0.5)';X.shadowBlur=4;X.fillText('게임 클리어!',W/2,560);X.restore();
    X.fillStyle='rgba(255,255,255,0.8)';X.font=FN(14);X.fillText('파티: '+party.map(p=>p.ic+p.n).join(', '),W/2,590);
    btns.push({x:W/2-65,y:624,w:130,h:60,id:'restart'});
    rr(X,W/2-65,624,130,60,16,'#E84B7A');
    X.fillStyle='#fff';X.font=FN(14);X.fillText('다시 하기',W/2,654);
  }

  // Mute icon
  rr(X,W-40,4,36,28,8,'rgba(0,0,0,0.4)');
  X.fillStyle='#fff';X.font=FN(14);X.textAlign='center';
  X.fillText(AM.isMuted()?'\ud83d\udd07':'\ud83d\udd0a',W-22,22);
  // Transition
  if(trA>0){X.fillStyle='rgba(0,0,0,'+trA+')';X.fillRect(0,0,W,H)}
  // Pause
  if(paused&&(scr==='map'||scr==='battle')){
    X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(0,0,W,H);
    X.fillStyle='#fff';X.font='bold '+FN(28);X.textAlign='center';X.fillText('일시정지',W/2,H/2-20);
    X.fillStyle='rgba(255,255,255,0.6)';X.font=FN(14);X.fillText('터치하여 계속하기',W/2,H/2+20);
    btns=[{x:0,y:0,w:W,h:H,id:'resume'}];
  }
}

// ===== INPUT =====
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(scr==='story'&&(e.key===' '||e.key==='Enter'))advSt();
  if(scr==='map'&&dlg&&(e.key===' '||e.key==='Enter')){advDlg();keys[' ']=false;keys.Enter=false}
});
document.addEventListener('keyup',e=>{keys[e.key]=false});

function gp(e){const r=getCachedRect();const t2=e.changedTouches?e.changedTouches[0]:e;return{x:(t2.clientX-r.left)*(W/r.width),y:(t2.clientY-r.top)*(H/r.height)}}
function inR(p,r){return p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h}
function inC(p,cx,cy,r){return(p.x-cx)**2+(p.y-cy)**2<=r*r}

function onDown(e){
  e.preventDefault();AM.init();AM.resume();const p=gp(e);if(trA>0.3)return;
  for(let i=0;i<btns.length;i++){
    const b=btns[i];
    if(!inR(p,b))continue;
    if(b.id==='mute'){AM.init();AM.toggleMute();AM.menuClick();return}
    if(b.id==='pause'){paused=true;return}
    if(b.id==='resume'){paused=false;return}
    if(b.id==='goTitle'){bat=null;scr='title';paused=false;return}
    if(b.id==='loadSave'){if(loadGame()){paused=false}return}
    if(b.id==='start'){
      party=[];storyFlags={ch:0};bag={hearts:5};deleteSave();
      // OPENING: Castle interior bg, correct portraits
      // 시녀 → HK_F (hk), 로미 → ROMI_F (rf)
      goStory([
        {bg:'bg_castle',char:null,sp:'',tx:'이모션 왕국\n\n핑크빛 장미 꽃잎이 하늘을 날아\n성 안 로미 공주의 손 위에 내려앉았어요.'},
        {bg:'bg_castle',char:'hk',sp:'시녀',tx:'공주님, 일어나세요~!\n오늘은 아주 중요한 날이에요!'},
        {bg:'bg_castle',char:'rf',sp:'로미 💖',tx:'오늘은... 맞다!\n내 짝꿍 티니핑을 찾는 날!'},
      ],()=>enterMap('castle_room',2,3));
      return;
    }
    if(b.id==='restart'){location.reload();return}
    if(b.id==='party'){menuOpen=true;AM.menuClick();return}
    if(b.id==='closeMenu'){menuOpen=false;AM.menuClick();return}
    if(b.id==='batEnd'){batEnd();return}
    if(b.id==='attack'){batAction('attack');return}
    if(b.id==='skill'){batAction('skill');return}
    if(b.id==='capture'){batAction('capture');return}
    if(b.id==='run'){batAction('run');return}
    if(b.id==='back'&&bat){bat.phase='select';return}
    if(b.id&&b.id.startsWith('sk')){useSkill(parseInt(b.id.slice(2)));return}
  }
  if(scr==='story'){advSt();return}
  if(scr==='map'&&dlg){advDlg();return}
  if(scr==='map'&&!dlg&&!menuOpen){
    const cx=70,cy=H-80;
    if(inC(p,cx,cy-35,35))tU=true;
    if(inC(p,cx,cy+35,35))tDn=true;
    if(inC(p,cx-35,cy,35))tL=true;
    if(inC(p,cx+35,cy,35))tR=true;
    if(inC(p,W-60,H-80,35)){tA=true;interact()}
  }
}
function onUp(e){e.preventDefault();tL=false;tR=false;tU=false;tDn=false;tA=false}
function onMove(e){e.preventDefault();if(scr!=='map')return;
  tL=false;tR=false;tU=false;tDn=false;
  const cx=70,cy=H-80;
  for(const t2 of(e.touches||[e])){
    const r=getCachedRect();
    const p={x:(t2.clientX-r.left)*(W/r.width),y:(t2.clientY-r.top)*(H/r.height)};
    if(inC(p,cx,cy-35,35))tU=true;if(inC(p,cx,cy+35,35))tDn=true;
    if(inC(p,cx-35,cy,35))tL=true;if(inC(p,cx+35,cy,35))tR=true;
  }
}
C.addEventListener('mousedown',onDown);C.addEventListener('mouseup',onUp);
C.addEventListener('touchstart',onDown,{passive:false});C.addEventListener('touchend',onUp,{passive:false});
C.addEventListener('touchmove',onMove,{passive:false});

// ===== GAME LOOP =====
function loop(){if(!paused){update()}render();requestAnimationFrame(loop)}
function wait(){
  if(iL<iT){
    X.fillStyle='#1a0a2e';X.fillRect(0,0,W,H);
    X.fillStyle='#FF6B9D';X.font=FN(16);X.textAlign='center';
    X.fillText('로딩 중...',W/2,H/2);
    rr(X,W/4,H/2+20,W/2,8,4,'rgba(255,255,255,0.1)');
    rr(X,W/4,H/2+20,W/2*(iL/iT),8,4,'#FF6B9D');
    requestAnimationFrame(wait);
  } else {
    genTiles();
    requestAnimationFrame(loop);
  }
}
wait();
</script>
</body></html>
