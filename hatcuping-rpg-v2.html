  return{init,resume,toggleMute:()=>{muted=!muted;return muted},isMuted:()=>muted,

function heart(c,x,y,s,col){c.save();c.translate(x,y);c.scale(s/16,s/16);c.fillStyle=col;c.beginPath();c.moveTo(0,-4);c.bezierCurveTo(-8,-14,-18,-4,-8,4);c.lineTo(0,12);c.moveTo(0,-4);c.bezierCurveTo(8,-14,18,-4,8,4);c.lineTo(0,12);c.fill();c.restore()}
function rr(c,x,y,w,h,r,f,s){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();if(f){c.fillStyle=f;c.fill()}if(s){c.strokeStyle=s;c.lineWidth=2;c.stroke()}}
function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function lerp(a,b,t){return a+(b-a)*t}

function saveGame(){try{

  localStorage.setItem('hatcuping_rpg2_save',JSON.stringify(sv))}catch(e){}}
function loadGame(){try{
  const raw=localStorage.getItem('hatcuping_rpg2_save');if(!raw)return false;
  const sv=JSON.parse(raw);
  party=sv.party.map(p=>{const ch=mkCh(p.key,p.level);if(!ch)return null;ch.hp=p.hp;ch.mhp=p.mhp;ch.a=p.a;ch.d=p.d;ch.exp=p.exp;ch.sk=p.sk;return ch}).filter(Boolean);
  bag=sv.bag||{hearts:5};storyFlags.ch=sv.ch||0;
  if(sv.quests)sv.quests.forEach((d,i)=>{if(QUESTS[i])QUESTS[i].done=d});
  if(sv.stickers)sv.stickers.forEach((d,i)=>{if(STICKERS[i])STICKERS[i].earned=d});
  if(sv.inventory)inventory=sv.inventory.map(id=>ACCESSORIES.find(a=>a.id===id)).filter(Boolean);
  if(sv.equipped)equipped=ACCESSORIES.find(a=>a.id===sv.equipped)||null;
  if(sv.visited)visitedMaps=sv.visited;
  if(sv.autoBattle!==undefined)autoBattle=sv.autoBattle;
  enterMap(sv.curMap||'castle_room',sv.px,sv.py);return true}catch(e){return false}}

function tryMove(dir){
  if(P.moving||dlg||menuOpen||!mapData)return;
  P.dir=dir;let nx=P.x,ny=P.y;
  if(dir==='up')ny--;if(dir==='down')ny++;if(dir==='left')nx--;if(dir==='right')nx++;
  if(nx<0||nx>=mapData.w||ny<0||ny>=mapData.h)return;
  const tile=mapData.tiles[ny][nx];if(!TILE_WALK[tile])return;
  const npc=mapData.npcs.find(n=>n.x===nx&&n.y===ny);if(npc)return;
  P.tx=nx;P.ty=ny;P.moving=true;P.mt=0;
}

function interact(){
  if(dlg||P.moving||menuOpen||!mapData)return;
  if(interactCD>0)return;interactCD=15;
  let fx=P.x,fy=P.y;
  if(P.dir==='up')fy--;if(P.dir==='down')fy++;if(P.dir==='left')fx--;if(P.dir==='right')fx++;
  const npc=mapData.npcs.find(n=>n.x===fx&&n.y===fy);
  if(npc){
    if(npc.cond){const ch=parseInt(npc.cond.replace('ch',''));if(isNaN(ch)||storyFlags.ch!==ch)return}
    dlg={lines:npc.dialog,name:npc.name,idx:0,npc};
    // Quest completion check
    QUESTS.forEach(q=>{if(!q.done&&q.map===curMap&&q.npc===npc.name){q.done=true;bag.hearts+=(q.reward.hearts||0);AM.questComplete()}});
    if(npc.cond){const ch=parseInt(npc.cond.replace('ch',''));if(!isNaN(ch)&&storyFlags.ch===ch){storyFlags.ch=Math.min(ch+1,99);saveGame();updateHint()}}
    return;
  }
  const warp=mapData.warps.find(w=>w.x===P.x&&w.y===P.y);
  if(warp){enterMap(warp.map,warp.tx,warp.ty);return}
}

function updateMap(){
  if(interactCD>0)interactCD--;
  if(stickerPopup){stickerPopup.t--;if(stickerPopup.t<=0)stickerPopup=null}
  if(dlg||menuOpen||!mapData)return;
  if(!P.moving){
    if(keys.ArrowUp||keys.w||tU)tryMove('up');
    else if(keys.ArrowDown||keys.s||tDn)tryMove('down');
    else if(keys.ArrowLeft||keys.a||tL)tryMove('left');
    else if(keys.ArrowRight||keys.d||tR)tryMove('right');
  }
  if(P.moving){
    P.mt+=16;const prog=clamp(P.mt/MS,0,1);const ease=1-(1-prog)*(1-prog);
    P.vx=lerp(P.x,P.tx,ease);P.vy=lerp(P.y,P.ty,ease);P.wf=prog;
    if(prog>=1){
      P.x=P.tx;P.y=P.ty;P.vx=P.x;P.vy=P.y;P.moving=false;P.wf=0;
      const tile=mapData.tiles[P.y][P.x];
      if(tile===10){const warp=mapData.warps.find(w=>w.x===P.x&&w.y===P.y);if(warp){enterMap(warp.map,warp.tx,warp.ty);return}}
      if(party.length>0){const encRate=TILE_ENCOUNTER[tile];
        if(encRate&&Math.random()<encRate&&mapData.encounters.length>0){
          const enc=mapData.encounters[rng(0,mapData.encounters.length-1)];
          startBattle(mkCh(enc.key,rng(enc.minLv,enc.maxLv)),false)}}
    }
  }
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.l-=0.02});parts=parts.filter(p=>p.l>0);
  if(keys[' ']||keys.Enter||tA){if(dlg)advDlg();else interact();keys[' ']=false;keys.Enter=false;tA=false}
  if(keys.Escape||keys.m){menuOpen=!menuOpen;keys.Escape=false;keys.m=false}
}

// ===== BATTLE =====
function startBattle(enemy,isBoss){
  const myChar=party[0]?{...party[0]}:mkCh('hatchu',5);
  // Apply equipment
  if(equipped){if(equipped.stat.a)myChar.a+=equipped.stat.a;if(equipped.stat.d)myChar.d+=equipped.stat.d;
    if(equipped.stat.spd)myChar.spd+=equipped.stat.spd;if(equipped.stat.hp){myChar.mhp+=equipped.stat.hp;myChar.hp=Math.min(myChar.hp+equipped.stat.hp,myChar.mhp)}}
  bat={en:enemy,my:myChar,turn:'player',log:enemy.ic+' '+enemy.n+' 등장!',
    phase:'select',selIdx:0,over:false,isBoss,catching:null,enShake:0,myShake:0,dmgNums:[],anim:0};
  AM.battleStart();doTrans('battle');
  if(autoBattle&&!isBoss)setTimeout(()=>autoAction(),600);
}
function autoAction(){
  if(!bat||bat.over||bat.turn!=='player')return;
  // Simple auto: use best skill
  const bestSk=bat.my.sk.reduce((a,b)=>b.pw>a.pw?b:a,bat.my.sk[0]);
  const idx=bat.my.sk.indexOf(bestSk);
  if(bestSk.pw<0||bestSk.tp==='shield'){batAction('attack')}
  else useSkill(idx);
}
function batAction(action){
  if(!bat||bat.over||bat.turn!=='player')return;
  if(action==='attack'){bat.turn='animating';AM.attack();const sk=bat.my.sk[0];const d=calcDmg(bat.my,bat.en,sk);
    bat.en.hp-=d;bat.enShake=15;bat.log=bat.my.n+'의 '+sk.n+'! '+d+' 데미지!';
    bat.dmgNums.push({v:d,x:300,y:100,t:40,heal:false});
    setTimeout(()=>{if(bat&&bat.en.hp<=0)batWin();else if(bat)enemyTurn()},600)}
  else if(action==='skill'){bat.phase='skill';bat.selIdx=0}
  else if(action==='capture'){
    if(bat.isBoss){bat.log='보스는 포획 불가!';return}
    if(bag.hearts<=0){bat.log='하트가 없어!';return}
    bag.hearts--;bat.turn='animating';bat.catching='...';
    const rate=clamp(80-(bat.en.hp/bat.en.mhp)*55,25,85);
    setTimeout(()=>{if(!bat)return;
      if(Math.random()*100<rate){bat.catching=bat.en.n+' 포획 성공!';bat.over=true;AM.captureOk();
        party.push(mkCh(bat.en.key,bat.en.level));setTimeout(()=>{if(bat)bat.catching=null;batEnd()},1200)}
      else{bat.catching='빠져나갔다!';AM.captureFail();setTimeout(()=>{if(bat)bat.catching=null;enemyTurn()},800)}},1000)}
  else if(action==='run'){
    if(bat.isBoss){bat.log='보스에게서 도망 불가!';return}
    if(Math.random()<0.85){batEnd()}else{bat.log='도망 실패!';bat.turn='animating';setTimeout(()=>{if(bat)enemyTurn()},400)}}
}
function useSkill(idx){
  if(!bat||bat.turn!=='player'||idx<0||idx>=bat.my.sk.length)return;
  const sk=bat.my.sk[idx];bat.turn='animating';bat.phase='select';AM.skill();
  if(sk.pw<0){const h=Math.abs(sk.pw);bat.my.hp=Math.min(bat.my.mhp,bat.my.hp+h);bat.log=sk.n+'! HP +'+h;
    bat.dmgNums.push({v:h,x:100,y:220,t:40,heal:true});setTimeout(()=>{if(bat)enemyTurn()},600)}
  else if(sk.tp==='shield'){bat.log=sk.n+'! 방어력 UP!';bat.my.d+=3;setTimeout(()=>{if(bat)enemyTurn()},600)}
  else{const d=calcDmg(bat.my,bat.en,sk);bat.en.hp-=d;bat.enShake=15;bat.log=sk.n+'! '+d+' 데미지!';
    bat.dmgNums.push({v:d,x:300,y:100,t:40,heal:false});setTimeout(()=>{if(bat&&bat.en.hp<=0)batWin();else if(bat)enemyTurn()},600)}
}
function calcDmg(atk,def,sk){let d=Math.max(1,atk.a+sk.pw-Math.floor(def.d*0.4))+rng(0,4);let eff=0;
  if(sk.tp==='love'&&def.type==='dark'){d=Math.floor(d*1.5);eff=1}
  if(sk.tp==='ice'&&def.type==='fire'){d=Math.floor(d*1.5);eff=1}
  if(sk.tp==='fire'&&def.type==='ice'){d=Math.floor(d*1.5);eff=1}
  if(sk.tp==='dark'&&def.type==='love'){d=Math.floor(d*0.7);eff=-1}
  if(eff!==0)typeEffText={msg:eff>0?'효과가 좋다!':'효과가 약하다...',t:60,good:eff>0};return d}
function enemyTurn(){
  if(!bat||bat.over)return;AM.enemyAttack();
  const sk=bat.en.sk[rng(0,bat.en.sk.length-1)];
  if(sk.pw<0){const h=Math.abs(sk.pw);bat.en.hp=Math.min(bat.en.mhp,bat.en.hp+h);bat.log=bat.en.n+'의 '+sk.n+'! HP+'+h;
    bat.dmgNums.push({v:h,x:300,y:100,t:40,heal:true})}
  else{const d=calcDmg(bat.en,bat.my,sk);bat.my.hp-=d;bat.myShake=15;AM.damage();
    bat.log=bat.en.n+'의 '+sk.n+'! '+d+' 데미지!';bat.dmgNums.push({v:d,x:100,y:220,t:40,heal:false})}
  setTimeout(()=>{if(!bat)return;
    if(bat.my.hp<=0){bat.over=true;bat.log='아야! 다음엔 이길 수 있어!';
      setTimeout(()=>{if(party[0])party[0].hp=party[0].mhp;if(bat)batEnd()},3000)}
    else{bat.turn='player';bat.phase='select';
      if(autoBattle&&!bat.isBoss)setTimeout(()=>autoAction(),400)}},500)}
function batWin(){
  if(!bat)return;bat.over=true;AM.victory();
  const exp=bat.en.level*12+15;
  if(party[0]){party[0].exp+=exp;party[0].hp=Math.max(1,bat.my.hp);
    party[0].hp=Math.min(party[0].mhp,party[0].hp+Math.floor(party[0].mhp*0.5));
    if(party[0].exp>=party[0].level*25){party[0].level++;party[0].mhp+=6;party[0].hp=party[0].mhp;party[0].a+=2;party[0].d+=1;party[0].exp=0;AM.levelUp();
      bat.log='Lv.'+party[0].level+'! '+bat.en.n+' 격파! 대단해!'}
    else bat.log=bat.en.n+' 격파! EXP+'+exp+' 잘했어!'}
  // Random accessory drop
  if(!bat.isBoss&&Math.random()<0.15){const acc=ACCESSORIES[rng(0,ACCESSORIES.length-1)];
    if(!inventory.find(i=>i.id===acc.id)){inventory.push(acc);bat.log+='\n'+acc.name+' 획득!'}}
  if(bat.isBoss){bat.log='트러핑 격파! 사랑이 이겼다!';earnSticker('s4');
    setTimeout(()=>{bat=null;
      goStory([
        {bg:'bg_forest',char:'hf',sp:'하츄핑',tx:'로미... 고마워!\n네 덕분에 용기를 얻었어!'},
        {bg:'bg_castle',char:'lip',sp:'리암 왕자',tx:'잠깐! 트러핑의 진실을\n알고 싶지 않아?'},
        {bg:'bg_castle',char:'rf',sp:'로미',tx:'트러핑의 진실...?\n알고 싶어!'},
        {bg:'bg_fountain',char:null,sp:'',tx:'비밀 정원으로 가면\n라라핑이 알고 있대요!'},
      ],()=>{enterMap('secret_garden',4,5)})},2000);return}
  checkStickers();setTimeout(()=>{if(bat)batEnd()},2000)}
function batEnd(){if(!bat&&scr!=='battle')return;bat=null;doTrans('map')}

// ===== UPDATE =====
function update(){
  t+=0.02;ticks++;
  if(typeEffText){typeEffText.t--;if(typeEffText.t<=0)typeEffText=null}
  if(trD>0){trA=Math.min(1,trA+0.05);if(trA>=1&&trNx){trNx();trNx=null}}
  if(trD<0){trA=Math.max(0,trA-0.05);if(trA<=0)trD=0}
  if(scr==='map')updateMap();
  if(scr==='battle'&&bat){bat.anim+=0.05;if(bat.enShake>0)bat.enShake--;if(bat.myShake>0)bat.myShake--;
    bat.dmgNums.forEach(d=>d.t--);bat.dmgNums=bat.dmgNums.filter(d=>d.t>0)}
  if(scr==='minigame'&&miniGame){
    if(miniGame.type==='match'&&miniGame.lockT>0){miniGame.lockT--;
      if(miniGame.lockT===0&&miniGame.first!==null&&miniGame.second!==null){
        if(miniGame.cards[miniGame.first].ic===miniGame.cards[miniGame.second].ic){
          miniGame.cards[miniGame.first].matched=true;miniGame.cards[miniGame.second].matched=true;miniGame.matches++;AM.menuClick();
          if(miniGame.matches>=miniGame.total){AM.miniWin();bag.hearts+=3;
            setTimeout(()=>{const cb=miniGame.cb;miniGame=null;scr='map';if(cb)cb()},1500)}}
        else{miniGame.cards[miniGame.first].flipped=false;miniGame.cards[miniGame.second].flipped=false}
        miniGame.first=null;miniGame.second=null}}
    if(miniGame&&miniGame.type==='befriend'){
      miniGame.timer++;
      if(miniGame.msgT>0)miniGame.msgT--;
      miniGame.heartAnim=miniGame.heartAnim.filter(h=>{h.y-=1.5;h.t--;return h.t>0});
      if(miniGame.shakeT>0)miniGame.shakeT--;
      if(miniGame.successT>0){miniGame.successT--;
        if(miniGame.successT<=0){AM.captureOk();bag.hearts+=5;
          setTimeout(()=>{const cb=miniGame.cb;miniGame=null;scr='map';if(cb)cb()},800)}}
    }
    if(miniGame&&miniGame.type==='busdodge'){
      miniGame.timer++;miniGame.roadY=(miniGame.roadY+miniGame.speed)%40;
      if(miniGame.hitFlash>0)miniGame.hitFlash--;
      // speed up over time
      miniGame.speed=3+miniGame.timer/300;
      // spawn obstacles
      miniGame.spawnT++;
      if(miniGame.spawnT>Math.max(25,60-miniGame.timer/20)){
        miniGame.spawnT=0;
        const lane=rng(0,2);
        const types=['🪨','🌲','🪵'];
        miniGame.obstacles.push({lane,y:-30,type:types[rng(0,2)]});
      }
      // move obstacles
      miniGame.obstacles.forEach(o=>o.y+=miniGame.speed);
      // collision check
      const bx=miniGame.lane*miniGame.laneW+miniGame.laneW/2;
      miniGame.obstacles=miniGame.obstacles.filter(o=>{
        const ox=o.lane*miniGame.laneW+miniGame.laneW/2;
        if(Math.abs(ox-bx)<40&&Math.abs(o.y-miniGame.busY)<25){
          miniGame.lives--;miniGame.hitFlash=20;AM.damage();return false;
        }
        return o.y<H+40;
      });
      miniGame.score=Math.floor(miniGame.timer/10);
      // game over
      if(miniGame.lives<=0||miniGame.timer>=miniGame.maxTime){
        AM.miniWin();
        setTimeout(()=>{const cb=miniGame.cb;miniGame=null;scr='map';if(cb)cb()},1200);
        miniGame.timer=miniGame.maxTime;// stop
      }
      // move trees down
      miniGame.trees.forEach(tr=>{tr.y+=miniGame.speed*0.5;if(tr.y>H+20)tr.y=-20});
    }
    if(miniGame&&miniGame.type==='reconcile'){
      miniGame.timer++;
      if(miniGame.msgT>0)miniGame.msgT--;
      miniGame.heartAnim=miniGame.heartAnim.filter(h=>{h.y-=1.5;h.t--;return h.t>0});
      if(miniGame.shakeT>0)miniGame.shakeT--;
      if(miniGame.successT>0){miniGame.successT--;
        if(miniGame.successT<=0){AM.captureOk();
          setTimeout(()=>{const cb=miniGame.cb;miniGame=null;scr='map';if(cb)cb()},800)}}
    }
    if(miniGame&&miniGame.type==='rhythm'){miniGame.timer++;
      if(miniGame.beatI<miniGame.beats.length){const b=miniGame.beats[miniGame.beatI];
        if(miniGame.timer>b.t+20&&!b.hit){b.miss=true;miniGame.beatI++}}
      if(miniGame.beatI>=miniGame.beats.length&&miniGame.timer>miniGame.beats[miniGame.beats.length-1].t+40){
        AM.miniWin();bag.hearts+=2;
        setTimeout(()=>{const cb=miniGame.cb;miniGame=null;scr='map';if(cb)cb()},1500)}}
  }
}

const _bgGrad={};
function getBgGrad(type){if(_bgGrad[type])return _bgGrad[type];
  const g=X.createLinearGradient(0,0,0,H);
  if(type==='title'){g.addColorStop(0,'#FFB8D4');g.addColorStop(0.3,'#FF6B9D');g.addColorStop(0.6,'#E84B7A');g.addColorStop(1,'#C2185B')}
  else if(type==='sunset'){g.addColorStop(0,'#FF9A8B');g.addColorStop(0.5,'#FFB8D4');g.addColorStop(1,'#FFDEE9')}
  else if(type==='forest'){g.addColorStop(0,'#87CEEB');g.addColorStop(0.5,'#B5EAD7');g.addColorStop(1,'#7EC850')}
  else if(type==='dark'){g.addColorStop(0,'#0d0520');g.addColorStop(0.5,'#1a0a2e');g.addColorStop(1,'#2d1b4e')}
  else if(type==='castle'){g.addColorStop(0,'#E8D5F5');g.addColorStop(0.5,'#FFE4F0');g.addColorStop(1,'#D4C1EC')}
  _bgGrad[type]=g;return g}
let _cachedRect=null,_rectFrame=-1;
function getCachedRect(){if(_rectFrame!==ticks){_cachedRect=C.getBoundingClientRect();_rectFrame=ticks}return _cachedRect}

function drawEnvBG(key){const img=IM[key];
  if(img){const sc=Math.max(W/img.width,H/img.height);X.drawImage(img,(W-img.width*sc)/2,(H-img.height*sc)/2,img.width*sc,img.height*sc)}
  else{// Fallback gradient based on key name
    let type='castle';if(key&&key.includes('forest'))type='forest';if(key&&key.includes('dark'))type='dark';if(key&&key.includes('fountain'))type='sunset';
    X.fillStyle=getBgGrad(type);X.fillRect(0,0,W,H)}}
function drawCharSprite(sprKey){if(!sprKey)return;const img=IM[sprKey];if(!img)return;

// ===== MAP RENDERING =====
function renderMap(){
  if(!mapData)return;
  const isDark=curMap==='laminne'||curMap==='trup_tower';
  // Background color based on map
  if(isDark){X.fillStyle=getBgGrad('dark');X.fillRect(0,0,W,H)}
  else if(curMap==='forest'||curMap==='secret_garden'){X.fillStyle=getBgGrad('forest');X.fillRect(0,0,W,H)}
  else{X.fillStyle=getBgGrad('castle');X.fillRect(0,0,W,H)}
  const camX=P.vx*T+T/2-W/2,camY=P.vy*T+T/2-H/2.5;
  X.save();X.translate(-camX,-camY);
  // Draw tiles
  for(let y=0;y<mapData.h;y++)for(let x=0;x<mapData.w;x++){const tile=mapData.tiles[y][x];const cv=tileCanvas[tile];if(cv)X.drawImage(cv,x*T,y*T)}
  // Door indicators (sparkle on door tiles)
  mapData.warps.forEach(w=>{
    const wx=w.x*T+T/2,wy=w.y*T+T/2;
    X.fillStyle='rgba(255,215,0,'+(0.4+Math.sin(t*3+w.x)*0.3)+')';
    X.beginPath();X.arc(wx,wy-5+Math.sin(t*2)*3,5,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(255,215,0,0.6)';X.font=FN(10);X.textAlign='center';X.fillText('EXIT',wx,wy-15+Math.sin(t*2)*2);
  });
  // Hint arrow
  if(hintArrow){
    const ax=hintArrow.x*T+T/2,ay=hintArrow.y*T-10+Math.sin(t*4)*6;
    X.fillStyle='rgba(255,215,0,'+(0.6+Math.sin(t*5)*0.3)+')';X.font='bold '+FN(18);X.textAlign='center';
    const arrows={up:'↓',down:'↓',left:'→',right:'→'};
    X.fillText(arrows[hintArrow.dir]||'↓',ax,ay);
    // Message above
    X.fillStyle='rgba(255,215,0,0.9)';X.font=FN(10);X.fillText(hintArrow.msg,ax,ay-18);
  }
  // NPCs
  const sprMap={hk:'hk',kk:'kk',bk:'bk',ba:'ba',ch:'ch',hs:'hm',ts:'ts',rf:'rf',st:'st',li:'li',la:'la'};
  mapData.npcs.forEach(n=>{
    if(n.cond){const ch=parseInt(n.cond.replace('ch',''));if(isNaN(ch)||storyFlags.ch>ch+1)return}
    const nx=n.x*T,ny=n.y*T,bob=Math.sin(t*2+n.x)*2;
    const img=n.spr?IM[sprMap[n.spr]]:null;
    if(img){const iw=Math.min(T-4,img.width*(T/img.height));X.drawImage(img,nx+T/2-iw/2,ny+bob-4,iw,T)}
    else{X.fillStyle=isDark?'#6a3d7d':'#c9a96e';X.beginPath();X.arc(nx+T/2,ny+T/2+bob,T/3,0,Math.PI*2);X.fill();
      X.fillStyle='#fff';X.font=FN(10);X.textAlign='center';X.fillText(n.name,nx+T/2,ny+T/2+bob+3)}
    // Exclamation mark for story NPCs
    if(n.cond){const ch=parseInt(n.cond.replace('ch',''));
      if(!isNaN(ch)&&storyFlags.ch===ch){X.fillStyle='#FFD700';X.font='bold '+FN(16);X.textAlign='center';
        X.fillText('!',nx+T/2,ny-8+Math.sin(t*3)*3);
        // Sparkle ring

  rr(X,10,by+60,W-20,24,8,'rgba(0,0,0,0.4)');

    X.fillStyle='#fff';X.font=FN(13);X.fillText('확인',W/2,H*0.3+78)}
}

function renderMiniGame(){
  if(!miniGame)return;
  X.fillStyle=getBgGrad('sunset');X.fillRect(0,0,W,H);
  // ===== BEFRIEND ENCOUNTER =====
  if(miniGame.type==='befriend'){
    drawEnvBG('bg_castle');
    X.fillStyle='rgba(0,0,0,0.2)';X.fillRect(0,0,W,H);
    // Title
    X.fillStyle='#FFD700';X.font='bold '+FN(20);X.textAlign='center';
    X.fillText('야생 하츄핑 조우!',W/2,45);
    // Hatcuping sprite
    const shk=miniGame.shakeT>0?Math.sin(miniGame.shakeT*2)*5:0;
    const bob=Math.sin(t*2)*6;
    if(IM.hm){const im=IM.hm;const ch=160;const cw=im.width*(ch/im.height);
      X.drawImage(im,W/2-cw/2+shk,100+bob,cw,ch)}

    X.fillStyle='#fff';X.font=FN(14);X.fillText('우호도:',W/2,280);
    for(let i=0;i<miniGame.friendMax;i++){
      const hx=W/2-40+i*30;
      heart(X,hx,300,12,i<miniGame.friendship?'#FF6B9D':'#555');
    }
    // Floating hearts
    miniGame.heartAnim.forEach(h=>{
      X.globalAlpha=h.t/40;heart(X,h.x,h.y,8,'#FF6B9D');X.globalAlpha=1});
    // Message
    if(miniGame.msgT>0){
      rr(X,20,330,W-40,50,10,'rgba(0,0,0,0.8)');
      X.fillStyle='#fff';X.font=FN(15);X.textAlign='center';
      X.fillText(miniGame.msg,W/2,360);
    }
    // Action buttons
    btns=[];
    if(miniGame.successT<=0&&miniGame.friendship<miniGame.friendMax){
      miniGame.actions.forEach((a,i)=>{
        const bx=30,by=400+i*60,bw=W-60,bh=50;

    // Game over overlay
    if(miniGame.lives<=0){
      X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(0,0,W,H);
      X.fillStyle='#FFD700';X.font='bold '+FN(22);X.textAlign='center';
      X.fillText('도착! 라미엔느로!',W/2,H/2);
    }
    if(miniGame.timer>=miniGame.maxTime){
      X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(0,0,W,H);
      X.fillStyle='#FFD700';X.font='bold '+FN(22);X.textAlign='center';
      X.fillText('안전 도착! 대단해!',W/2,H/2);
    }
    return;
  }
  if(miniGame.type==='reconcile'){
    drawEnvBG('bg_dark');
    X.fillStyle='rgba(0,0,0,0.3)';X.fillRect(0,0,W,H);
    X.fillStyle='#BA68C8';X.font='bold '+FN(20);X.textAlign='center';
    X.fillText('트러핑과 화해하기',W/2,45);
    const shk=miniGame.shakeT>0?Math.sin(miniGame.shakeT*2)*5:0;
    const bob=Math.sin(t*2)*6;
    if(IM.ts){const im=IM.ts;const ch=160;const cw=im.width*(ch/im.height);
      X.drawImage(im,W/2-cw/2+shk,100+bob,cw,ch)}
    X.fillStyle='#fff';X.font=FN(14);X.textAlign='center';X.fillText('우호도:',W/2,280);
    for(let i=0;i<miniGame.friendMax;i++){
      const hx=W/2-40+i*30;
      heart(X,hx,300,12,i<miniGame.friendship?'#BA68C8':'#555');
    }
    miniGame.heartAnim.forEach(h=>{
      X.globalAlpha=h.t/40;heart(X,h.x,h.y,8,'#BA68C8');X.globalAlpha=1});
    if(miniGame.msgT>0){
      rr(X,20,330,W-40,50,10,'rgba(0,0,0,0.8)');
      X.fillStyle='#fff';X.font=FN(15);X.textAlign='center';
      X.fillText(miniGame.msg,W/2,360);
    }
    btns=[];
    if(miniGame.successT<=0&&miniGame.friendship<miniGame.friendMax){
      miniGame.actions.forEach((a,i)=>{
        const bx=30,by=400+i*60,bw=W-60,bh=50;
        const emojis=['💜','📖','🤗'];
        rr(X,bx,by,bw,bh,12,'rgba(186,104,194,0.5)','rgba(255,255,255,0.3)');
        X.fillStyle='#fff';X.font='bold '+FN(16);X.textAlign='center';
        X.fillText(emojis[i]+' '+a,W/2,by+30);
        btns.push({x:bx,y:by,w:bw,h:bh,id:'reconcile'+i});
      });
    }
    if(miniGame.friendship>=miniGame.friendMax&&miniGame.successT>0){
      X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(0,0,W,H);
      X.fillStyle='#BA68C8';X.font='bold '+FN(24);X.textAlign='center';
      X.fillText('트러핑과 화해했다!',W/2,H/2-20);
      X.fillStyle='#fff';X.font=FN(14);X.fillText('우리는 이제 친구야!',W/2,H/2+20);
    }
    return;
  }
  if(miniGame.type==='match'){
    X.fillStyle='#fff';X.font='bold '+FN(20);X.textAlign='center';X.fillText('짝 맞추기!',W/2,40);
    X.fillStyle='rgba(255,255,255,0.7)';X.font=FN(13);X.fillText('같은 그림을 찾아봐!',W/2,65);
    btns=[];
    miniGame.cards.forEach((card,i)=>{
      const col=i%4,row=Math.floor(i/4);
      const cx=30+col*96,cy=85+row*100;
      rr(X,cx,cy,86,90,12,card.matched?'rgba(76,175,80,0.5)':card.flipped?'rgba(255,107,157,0.5)':'rgba(255,255,255,0.25)','rgba(255,255,255,0.4)');
      if(card.flipped||card.matched){X.fillStyle='#fff';X.font=FN(36);X.textAlign='center';X.fillText(card.ic,cx+43,cy+58)}
      else{X.fillStyle='rgba(255,255,255,0.5)';X.font=FN(28);X.textAlign='center';X.fillText('?',cx+43,cy+55)}
      if(!card.matched&&!card.flipped)btns.push({x:cx,y:cy,w:86,h:90,id:'card'+i})});
    if(miniGame.matches>=miniGame.total){X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(0,0,W,H);X.fillStyle='#FFD700';X.font='bold '+FN(24);X.textAlign='center';X.fillText('잘했어! 하트 +3!',W/2,H/2)}
  }
  else if(miniGame.type==='rhythm'){
    X.fillStyle='#fff';X.font='bold '+FN(20);X.textAlign='center';X.fillText('리듬 타이밍!',W/2,40);
    X.fillStyle='rgba(255,255,255,0.7)';X.font=FN(13);X.fillText('동그라미가 올 때 터치!',W/2,65);
    btns=[{x:0,y:100,w:W,h:H-100,id:'rhythmTap'}];
    // Target line
    X.strokeStyle='rgba(255,107,157,0.8)';X.lineWidth=3;X.beginPath();X.moveTo(0,400);X.lineTo(W,400);X.stroke();
    X.fillStyle='rgba(255,107,157,0.3)';X.fillRect(0,390,W,20);
    // Beats
    miniGame.beats.forEach((b,i)=>{
      if(b.matched)return;
      const prog=miniGame.timer-b.t+200;
      const y=100+prog*1.5;
      if(y<80||y>H)return;
      const atTarget=Math.abs(y-400)<25;
      X.fillStyle=b.hit?'#4CAF50':b.miss?'#F44336':atTarget?'rgba(255,107,157,0.9)':'rgba(255,255,255,0.5)';
      X.beginPath();X.arc(W/2,y,atTarget?22:18,0,Math.PI*2);X.fill();
      if(b.hit){X.fillStyle='#fff';X.font='bold '+FN(14);X.textAlign='center';X.fillText('GOOD!',W/2,y+5)}});
    // Hit indicator
    if(miniGame.hitT>0){miniGame.hitT--;X.fillStyle='rgba(255,215,0,0.5)';X.beginPath();X.arc(W/2,400,30+miniGame.hitT,0,Math.PI*2);X.fill()}
    X.fillStyle='#fff';X.font=FN(14);X.textAlign='center';X.fillText('점수: '+miniGame.score+'/'+miniGame.total,W/2,H-40);
    if(miniGame.beatI>=miniGame.beats.length){X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(0,0,W,H);X.fillStyle='#FFD700';X.font='bold '+FN(24);X.textAlign='center';X.fillText('잘했어! 하트 +2!',W/2,H/2)}
  }
}

    X.fillStyle='#fff';X.font=FN(17);X.textAlign='left';

    X.fillStyle='#fff';X.font='bold '+FN(26);X.textAlign='center';X.save();X.shadowColor='rgba(0,0,0,0.6)';X.shadowBlur=8;X.fillText('게임 클리어!',W/2,140);X.restore();

    ['로미와 하츄핑의 모험은','영원히 계속됩니다...','','너무 잘했어!','최고의 모험가야!'].forEach((l,i)=>X.fillText(l,W/2,180+i*26));
    if(IM.rp){const im=IM.rp;const ch=180;const cw=im.width*(ch/im.height);X.drawImage(im,20,330+Math.sin(t*1.5)*5,cw,ch)}

    X.fillStyle='rgba(255,255,255,0.6)';X.font=FN(14);X.fillText('터치하여 계속',W/2,H/2+20);

// ===== INPUT =====
document.addEventListener('keydown',e=>{keys[e.key]=true;
  if(scr==='story'&&(e.key===' '||e.key==='Enter'))advSt();
  if(scr==='map'&&dlg&&(e.key===' '||e.key==='Enter')){advDlg();keys[' ']=false;keys.Enter=false}});
document.addEventListener('keyup',e=>{keys[e.key]=false});
function gp(e){const r=getCachedRect();const t2=e.changedTouches?e.changedTouches[0]:e;return{x:(t2.clientX-r.left)*(W/r.width),y:(t2.clientY-r.top)*(H/r.height)}}
function inR(p,r){return p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h}
function inC(p,cx,cy,r){return(p.x-cx)**2+(p.y-cy)**2<=r*r}

function onDown(e){
  e.preventDefault();AM.init();AM.resume();const p=gp(e);if(trA>0.3)return;
  for(const b of btns){if(!inR(p,b))continue;
    if(b.id==='resume'){paused=false;return}
    if(b.id==='toggleAuto'){autoBattle=!autoBattle;AM.menuClick();return}
    if(b.id==='loadSave'){if(loadGame())paused=false;return}
    if(b.id==='start'){
      party=[];storyFlags={ch:0};bag={hearts:5};inventory=[];equipped=null;visitedMaps={};
      QUESTS.forEach(q=>q.done=false);STICKERS.forEach(s=>s.earned=false);
      goStory([
        {bg:'bg_castle',char:null,sp:'',tx:'이모션 왕국\n\n핑크빛 장미 꽃잎이 날아\n로미 공주의 손에 내려앉았어요.'},
        {bg:'bg_castle',char:'hk',sp:'시녀',tx:'공주님, 일어나세요~!\n오늘은 중요한 날이에요!'},
        {bg:'bg_castle',char:'rf',sp:'로미',tx:'오늘은... 맞다!\n내 짝꿍 티니핑을 찾는 날!'},
      ],()=>{earnSticker('s1');enterMap('castle_room',2,3)});return}
    if(b.id==='restart'){location.reload();return}
    if(b.id==='menu'){menuOpen=true;menuTab=0;AM.menuClick();return}
    if(b.id==='auto'){autoBattle=!autoBattle;AM.menuClick();return}
    if(b.id==='closeMenu'){menuOpen=false;AM.menuClick();return}
    if(b.id&&b.id.startsWith('tab')){menuTab=parseInt(b.id.slice(3));AM.menuClick();return}
    if(b.id&&b.id.startsWith('equip')){const idx=parseInt(b.id.slice(5));
      if(equipped&&equipped.id===inventory[idx].id)equipped=null;else equipped=inventory[idx];AM.menuClick();saveGame();return}
    if(b.id==='batEnd'){batEnd();return}
    if(b.id==='attack'){batAction('attack');return}
    if(b.id==='skill'){batAction('skill');return}
    if(b.id==='capture'){batAction('capture');return}
    if(b.id==='run'){batAction('run');return}
    if(b.id==='switch'){
      if(!bat||bat.over||bat.turn!=='player')return;
      if(party.length<=1){bat.log='교체할 파티원이 없어!';return}
      const first=party.shift();party.push(first);
      bat.my=party[0]?{...party[0]}:bat.my;
      if(equipped){if(equipped.stat.a)bat.my.a+=equipped.stat.a;if(equipped.stat.d)bat.my.d+=equipped.stat.d;
        if(equipped.stat.spd)bat.my.spd+=equipped.stat.spd;if(equipped.stat.hp){bat.my.mhp+=equipped.stat.hp;bat.my.hp=Math.min(bat.my.hp+equipped.stat.hp,bat.my.mhp)}}
      bat.log=bat.my.n+'(으)로 교체!';bat.turn='animating';
      setTimeout(()=>{if(bat)enemyTurn()},600);return}
    if(b.id==='back'&&bat){bat.phase='select';return}
    if(b.id&&b.id.startsWith('sk')){useSkill(parseInt(b.id.slice(2)));return}
    if(b.id&&b.id.startsWith('befriend')&&miniGame&&miniGame.type==='befriend'){
      const ai=parseInt(b.id.slice(7));AM.menuClick();
      miniGame.tries++;
      const responses=[
        ['...뭐야?','(경계하는 눈빛)','조금 관심을 보인다!'],
        ['(선물을 받았다!)','고마워...!','눈이 반짝인다!'],
        ['(노래를 듣고 있다)','좋은 노래...','꼬리를 살랑인다!']
      ];
      // Each action has a chance to increase friendship
      const success=Math.random()<0.6||(miniGame.tries>=2&&miniGame.friendship<miniGame.friendMax);
      if(success){
        miniGame.friendship++;
        miniGame.msg=responses[ai][2];
        miniGame.heartAnim.push({x:W/2+rng(-30,30),y:270,t:40});
        AM.captureOk();
      }else{
        miniGame.msg=responses[ai][rng(0,1)];
        miniGame.shakeT=15;AM.captureFail();
      }
      miniGame.msgT=90;
      if(miniGame.friendship>=miniGame.friendMax){
        miniGame.successT=90;
      }
      return;
    }
    if(b.id&&b.id.startsWith('reconcile')&&miniGame&&miniGame.type==='reconcile'){
      const ai=parseInt(b.id.slice(9));AM.menuClick();
      miniGame.tries++;
      const responses=[
        ['...몰라.','(외면한다)','...조금 마음이 풀렸어.'],
        ['...그때가 좋았는데.','(눈물을 닦는다)','기억해줘서 고마워...'],
        ['(놀라서 굳었다)','...따뜻하다.','...이 느낌이 좋아.']
      ];
      const success=Math.random()<0.6||(miniGame.tries>=2&&miniGame.friendship<miniGame.friendMax);
      if(success){
        miniGame.friendship++;miniGame.msg=responses[ai][2];
        miniGame.heartAnim.push({x:W/2+rng(-30,30),y:270,t:40});
        AM.captureOk();
      }else{
        miniGame.msg=responses[ai][rng(0,1)];miniGame.shakeT=15;AM.captureFail();
      }
      miniGame.msgT=90;
      if(miniGame.friendship>=miniGame.friendMax){miniGame.successT=90}
      return;
    }
    if(b.id==='busLeft'&&miniGame&&miniGame.type==='busdodge'){
      if(miniGame.lane>0){miniGame.lane--;AM.menuClick()}return;
    }
    if(b.id==='busRight'&&miniGame&&miniGame.type==='busdodge'){
      if(miniGame.lane<2){miniGame.lane++;AM.menuClick()}return;
    }
    if(b.id&&b.id.startsWith('card')&&miniGame&&miniGame.type==='match'){
      const ci=parseInt(b.id.slice(4));
      if(miniGame.lockT>0||miniGame.cards[ci].flipped||miniGame.cards[ci].matched)return;
      miniGame.cards[ci].flipped=true;miniGame.moves++;AM.menuClick();
      if(miniGame.first===null)miniGame.first=ci;
      else{miniGame.second=ci;miniGame.lockT=30}return}
    if(b.id==='rhythmTap'&&miniGame&&miniGame.type==='rhythm'){
      if(miniGame.beatI<miniGame.beats.length){const b2=miniGame.beats[miniGame.beatI];
        const prog=miniGame.timer-b2.t+200;const y=100+prog*1.5;
        if(Math.abs(y-400)<40){b2.hit=true;miniGame.score++;miniGame.hitT=15;AM.menuClick();miniGame.beatI++}
      }return}
    if(b.id==='pause'){paused=true;return}
  }
  if(scr==='story'){advSt();return}
  if(scr==='map'&&dlg){advDlg();return}
  if(scr==='map'&&!dlg&&!menuOpen){
    const cx=70,cy=H-80;
    if(inC(p,cx,cy-35,35))tU=true;if(inC(p,cx,cy+35,35))tDn=true;
    if(inC(p,cx-35,cy,35))tL=true;if(inC(p,cx+35,cy,35))tR=true;
    if(inC(p,W-60,H-80,35)){tA=true;interact()}
  }
}
function onUp(e){e.preventDefault();tL=false;tR=false;tU=false;tDn=false;tA=false}
function onMove(e){e.preventDefault();if(scr!=='map')return;
  tL=false;tR=false;tU=false;tDn=false;
  const cx=70,cy=H-80;
  for(const t2 of(e.touches||[e])){const r=getCachedRect();
    const p2={x:(t2.clientX-r.left)*(W/r.width),y:(t2.clientY-r.top)*(H/r.height)};
    if(inC(p2,cx,cy-35,35))tU=true;if(inC(p2,cx,cy+35,35))tDn=true;
    if(inC(p2,cx-35,cy,35))tL=true;if(inC(p2,cx+35,cy,35))tR=true}}
C.addEventListener('mousedown',onDown);C.addEventListener('mouseup',onUp);
C.addEventListener('touchstart',onDown,{passive:false});C.addEventListener('touchend',onUp,{passive:false});
C.addEventListener('touchmove',onMove,{passive:false});

// ===== GAME LOOP =====
function loop(){if(!paused)update();render();requestAnimationFrame(loop)}
