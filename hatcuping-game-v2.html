let _actx,_mute=false;
function _initAudio(){if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();if(_actx.state==='suspended')_actx.resume()}
function _osc(freq,type,dur,vol=0.3,detune=0){
  if(_mute||!_actx)return null;const o=_actx.createOscillator(),g=_actx.createGain();
  o.type=type;o.frequency.value=freq;o.detune.value=detune;g.gain.value=vol;
  o.connect(g);g.connect(_actx.destination);o.start();o.stop(_actx.currentTime+dur);return{o,g,t:_actx.currentTime}}
function sfxJump(){_initAudio();if(_mute||!_actx)return;const o=_osc(300,'sine',0.1,0.25);if(o)o.o.frequency.exponentialRampToValueAtTime(600,_actx.currentTime+0.08)}
function sfxDoubleJump(){_initAudio();if(_mute||!_actx)return;const o=_osc(500,'sine',0.12,0.2);if(o)o.o.frequency.exponentialRampToValueAtTime(900,_actx.currentTime+0.1);_osc(1200,'triangle',0.06,0.1)}

function sfxWallSlide(){_initAudio();if(_mute||!_actx)return;_osc(150,'sine',0.05,0.08)}

// ===== BGM LOOP SYSTEM =====
let _bgmInterval=null,_bgmName='';
function stopBGM(){if(_bgmInterval){clearInterval(_bgmInterval);_bgmInterval=null}_bgmName=''}
function _bgmLoop(name,notes,type,bpm,vol){
  if(_bgmName===name)return;stopBGM();_bgmName=name;
  const beatMs=60000/bpm;let step=0;
  _bgmInterval=setInterval(()=>{
    if(_mute||!_actx)return;
    const n=notes[step%notes.length];
    if(n>0)_osc(n,type,beatMs/1200,vol);
    step++;
  },beatMs);
}

function heart(c,x,y,s,col){c.save();c.translate(x,y);c.scale(s/16,s/16);c.fillStyle=col;c.beginPath();c.moveTo(0,-4);c.bezierCurveTo(-8,-14,-18,-4,-8,4);c.lineTo(0,12);c.moveTo(0,-4);c.bezierCurveTo(8,-14,18,-4,8,4);c.lineTo(0,12);c.fill();c.restore()}
function star(c,x,y,s,col){c.save();c.translate(x,y);c.fillStyle=col;c.beginPath();for(let i=0;i<5;i++){const a=Math.PI*2*i/5-Math.PI/2;const b=Math.PI*2*(i+0.5)/5-Math.PI/2;c.lineTo(Math.cos(a)*s,Math.sin(a)*s);c.lineTo(Math.cos(b)*s*0.4,Math.sin(b)*s*0.4)}c.closePath();c.fill();c.restore()}
function rr(c,x,y,w,h,r,f,s){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();if(f){c.fillStyle=f;c.fill()}if(s){c.strokeStyle=s;c.lineWidth=2;c.stroke()}}
function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

// ===== SCENE FLOW =====
function doTrans(s,cb){clearInterval(stTm);stTm=null;trD=1;trCircle=true;trNx=()=>{scr=s;if(cb)cb();trD=-1}}
function goStory(arr,cb){stQ=arr;stI=0;stTx='';stDn=false;stCb=cb;doTrans('story',()=>typeSt())}
function typeSt(){const s=stQ[stI];if(!s)return;stTx='';stDn=false;let i=0;const tx=s.tx;
  if(stTm){clearInterval(stTm);stTm=null}stTm=setInterval(()=>{if(paused)return;if(i<tx.length)stTx=tx.slice(0,++i);else{stDn=true;clearInterval(stTm);stTm=null}},22)}
function advSt(){if(!stDn){if(stTm){clearInterval(stTm);stTm=null}stTx=stQ[stI].tx;stDn=true;return}
  stI++;if(stI<stQ.length)typeSt();else{if(stTm){clearInterval(stTm);stTm=null}if(stCb)stCb()}}

// ===== INIT LEVEL =====
function initLv(i){const L=LEVELS[i];if(!L)return;
  const ch=chosenChar||CHARACTERS[0];
  P.x=L.sx;P.y=L.sy;P.vx=0;P.vy=0;P.gr=false;P.face=1;P.dead=false;
  P.djump=false;P.canDJ=false;P.wallSlide=false;P.dashCD=0;P.dashing=false;P.dashT=0;
  P.shieldT=0;P.speedT=0;P.magnetT=0;P.invincT=0;P.coyoteT=0;P.rainbowT=0;
  camX=0;lvDone=false;lvDoneT=0;
  hasDoubleJump=L.world>=2;hasWallSlide=L.world>=2;hasDash=L.world>=3;
  enemies_l=L.enemies.map(e=>[e[0],e[1],e[2],e[2]===0?1.0:e[2]===1?1.3:1.6,e[0]-50,e[0]+90,true]);
  items_l=L.items.map(it=>[it[0],it[1],it[2],true]);
  powerups_l=(L.powerups||[]).map(p=>[p[0],p[1],p[2],true]);
  if(L.stars) stars_l=L.stars.map(st=>[st[0],st[1],st[2],true]);
  else stars_l=[];
  npcs_l=L.npcs?L.npcs.map(n=>({x:n[0],y:n[1],spr:n[2],dlg:n[3],done:false})):[];
  parts=[];npcMsg='';npcT=0;
  combo=0;comboT=0;comboFloats=[];
  checkpoint=null;checkpointActive=false;checkpointToast=0;
  shakeX=0;shakeY=0;shakeT=0;
  // Place checkpoint at midpoint of level
  const midX=Math.floor(L.endX/2);
  checkpoint={x:midX,y:480,reached:false};
  if(L.boss){
    const bossHp=L.world===1?5:L.world===2?7:8;
    boss={hp:bossHp,mx:bossHp,x:L.endX-200,y:440,dir:1,active:true,atk:0,atkT:0,phase:0,gpT:0,gpShock:0,minions:[]};
  }else{boss={active:false}}
  hatchuShield=true;
}

// ===== PLATFORMER UPDATE =====
function updatePlay(){
  if(P.dead)return;
  if(lvDone){if(lvDoneT>0){lvDoneT--;if(lvDoneT<=0)onClear()}return}
  const L=LEVELS[lv];if(!L)return;
  const ch=chosenChar||CHARACTERS[0];
  const spd=ch.spd*(P.speedT>0?1.4:1);
  const jmp=ch.jmp;
  let mx=0;
  if(keys.ArrowLeft||keys.a||tL){mx=-1;P.face=-1}
  if(keys.ArrowRight||keys.d||tR){mx=1;P.face=1}
  // Dash
  if(hasDash&&(tDash||keys.Shift)&&P.dashCD<=0&&!P.dashing){
    P.dashing=true;P.dashT=12;P.dashDir=P.face;P.dashCD=60;sfxDash();
    for(let i=0;i<6;i++)parts.push({x:P.x+PW/2,y:P.y+PH/2,vx:-P.face*(1+Math.random()),vy:(Math.random()-0.5)*2,l:0.6,s:rng(3,5),c:'#FF6B9D'});
  }
  if(P.dashCD>0)P.dashCD--;
  if(P.dashing){P.vx=P.dashDir*7;P.dashT--;if(P.dashT<=0)P.dashing=false;}
  else P.vx=mx*spd;
  // Wall slide
  P.wallSlide=false;
  if(hasWallSlide&&!P.gr&&P.vy>0&&mx!==0){
    for(const pl of L.plat){const[px,py,pw,ph]=pl;
      if(mx>0&&P.x+PW>=px&&P.x+PW<=px+5&&P.y+PH>py+3&&P.y<py+ph-3){P.wallSlide=true;break}
      if(mx<0&&P.x<=px+pw&&P.x>=px+pw-5&&P.y+PH>py+3&&P.y<py+ph-3){P.wallSlide=true;break}
    }
  }
  if(P.wallSlide){P.vy=Math.min(P.vy,2);if(ticks%15===0)sfxWallSlide()}
  // Coyote time
  if(P.coyoteT>0&&!P.gr)P.coyoteT--;
  // Jump
  const wantJump=keys.ArrowUp||keys.w||keys[' ']||tJ;
  if(wantJump){
    if(P.gr||P.coyoteT>0){P.vy=jmp;P.gr=false;P.coyoteT=0;P.canDJ=hasDoubleJump;sfxJump()}
    else if(P.wallSlide){P.vy=jmp*0.9;P.vx=-mx*spd*1.5;P.canDJ=false;sfxJump()}
    else if(P.canDJ&&!P.djump){P.vy=jmp*0.85;P.djump=true;P.canDJ=false;sfxDoubleJump();
      for(let i=0;i<4;i++)parts.push({x:P.x+PW/2,y:P.y+PH,vx:(Math.random()-0.5)*3,vy:Math.random()*2,l:0.5,s:rng(2,4),c:'rgba(255,107,157,0.6)'});}
  }
  if(!P.dashing)P.vy=Math.min(P.vy+GR,MXF);
  P.x+=P.vx;P.y+=P.vy;
  if(P.gr)P.coyoteT=5;
  P.gr=false;
  for(const pl of L.plat){const[px,py,pw,ph]=pl;
    if(P.x+PW>px+3&&P.x<px+pw-3){
      if(P.vy>=0&&P.y+PH>=py&&P.y+PH-P.vy<=py+5){P.y=py-PH;P.vy=0;P.gr=true;P.djump=false;P.canDJ=hasDoubleJump}
      if(P.vy<0&&P.y<=py+ph&&P.y-P.vy>=py+ph-3){P.y=py+ph;P.vy=0}}
    if(P.y+PH>py+3&&P.y<py+ph-3){
      if(P.vx>0&&P.x+PW>px&&P.x+PW-P.vx<=px+2)P.x=px-PW;
      if(P.vx<0&&P.x<px+pw&&P.x-P.vx>=px+pw-2)P.x=px+pw}}
  if(P.y>620){die();return}
  P.x=Math.max(0,P.x);
  camX+=(P.x-W/3-camX)*0.1;camX=clamp(camX,0,Math.max(0,L.endX-W+100));
  // Powerup timers
  if(P.shieldT>0)P.shieldT--;if(P.speedT>0)P.speedT--;if(P.magnetT>0)P.magnetT--;if(P.invincT>0)P.invincT--;if(P.rainbowT>0)P.rainbowT--;
  // Magnet effect
  const magR=P.magnetT>0?150:0;
  // Collect items
  items_l.forEach(it=>{if(!it[3])return;
    let dx=P.x+PW/2-it[0],dy=P.y+PH/2-it[1];
    if(magR>0&&Math.sqrt(dx*dx+dy*dy)<magR){it[0]+=dx*0.08;it[1]+=dy*0.08}
    if(Math.abs(dx)<28&&Math.abs(dy)<28){it[3]=false;hts++;sfxHeart();
      for(let i=0;i<5;i++)parts.push({x:it[0],y:it[1],vx:(Math.random()-0.5)*4,vy:-Math.random()*3,l:1,s:rng(3,5),c:'#FF6B9D'})}});
  // Collect stars
  stars_l.forEach(st=>{if(!st[3])return;
    let dx=P.x+PW/2-st[0],dy=P.y+PH/2-st[1];
    if(magR>0&&Math.sqrt(dx*dx+dy*dy)<magR){st[0]+=dx*0.08;st[1]+=dy*0.08}
    if(Math.abs(dx)<28&&Math.abs(dy)<28){st[3]=false;starCount++;sfxStar();
      for(let i=0;i<8;i++)parts.push({x:st[0],y:st[1],vx:(Math.random()-0.5)*5,vy:-Math.random()*4,l:1,s:rng(3,6),c:'#FFD700'})}});
  // Collect powerups
  powerups_l.forEach(pu=>{if(!pu[3])return;
    if(Math.abs(P.x+PW/2-pu[0])<28&&Math.abs(P.y+PH/2-pu[1])<28){pu[3]=false;sfxPowerup();
      const tp=pu[2];
      if(tp===0)P.shieldT=PU_DUR[0];
      if(tp===1)P.speedT=PU_DUR[1];
      if(tp===2)P.magnetT=PU_DUR[2];
      if(tp===3){P.invincT=PU_DUR[3];P.rainbowT=PU_DUR[3]}
      if(tp===4)P.invincT=PU_DUR[4];
      npcMsg=PU_NAMES[tp]+' 획득!';npcT=120;
      for(let i=0;i<10;i++)parts.push({x:pu[0],y:pu[1],vx:(Math.random()-0.5)*5,vy:-Math.random()*4,l:1,s:rng(3,7),c:PU_COLORS[tp]})}});
  // Enemies
  enemies_l.forEach(e=>{if(!e[6])return;e[0]+=e[3];if(e[0]<=e[4]||e[0]>=e[5])e[3]=-e[3];
    if(Math.abs(P.x+PW/2-e[0]-15)<28&&Math.abs(P.y+PH-e[1]-15)<28){
      if(P.vy>0&&P.y+PH<e[1]+10){e[6]=false;P.vy=jmp*0.6;combo++;comboT=180;hts+=2+Math.floor(combo/3);sfxEnemyHit();
        comboFloats.push({x:e[0]+15,y:e[1]-10,vy:-1.5,t:90,combo:combo});
        if(combo>=10){shakeT=8}
        for(let i=0;i<8;i++)parts.push({x:e[0]+15,y:e[1],vx:(Math.random()-0.5)*5,vy:-Math.random()*4,l:1,s:rng(3,7),c:'#FFD700'})}
      else if(P.invincT>0){e[6]=false;combo++;comboT=180;hts+=2+Math.floor(combo/3);sfxEnemyHit();
        comboFloats.push({x:e[0]+15,y:e[1]-10,vy:-1.5,t:90,combo:combo});}
      else if(P.shieldT>0){P.shieldT=0;P.vy=jmp*0.4;combo=0;sfxDamage();npcMsg='보호막이 깨졌어!';npcT=120;}
      else die()}});
  npcs_l.forEach(n=>{if(n.done)return;
    if(Math.abs(P.x+PW/2-n.x)<50&&Math.abs(P.y+PH/2-n.y)<50){n.done=true;npcMsg=n.dlg;npcT=240}});
  if(npcT>0)npcT--;else npcMsg='';
  // Combo timer decay
  if(comboT>0){comboT--}else{combo=0}
  comboFloats.forEach(cf=>{cf.y+=cf.vy;cf.t--});comboFloats=comboFloats.filter(cf=>cf.t>0);
  // Screen shake
  if(shakeT>0){shakeX=(Math.random()-0.5)*6;shakeY=(Math.random()-0.5)*6;shakeT--}else{shakeX=0;shakeY=0}
  // Checkpoint detection
  if(checkpoint&&!checkpoint.reached&&P.x>=checkpoint.x){
    checkpoint.reached=true;checkpointToast=150;sfxCheckpoint();
    for(let i=0;i<8;i++)parts.push({x:checkpoint.x-camX+20,y:checkpoint.y,vx:(Math.random()-0.5)*4,vy:-Math.random()*3,l:1,s:rng(3,6),c:'#00FF88'})}
  if(checkpointToast>0)checkpointToast--;
  // Boss
  if(boss.active&&boss.hp>0){
    // Phase transitions
    if(boss.hp<=Math.floor(boss.mx/2)&&boss.phase<1)boss.phase=1;
    if(lv===8&&boss.hp<=2&&boss.phase<2)boss.phase=2;
    const phaseSpd=boss.phase===2?1.5:1;
    const bspd=(1.5+((boss.mx-boss.hp)*0.4)+(boss.phase*0.3))*phaseSpd;
    boss.x+=boss.dir*bspd;
    if(boss.x<LEVELS[lv].endX-300||boss.x>LEVELS[lv].endX-80)boss.dir=-boss.dir;
    boss.atkT++;
    // Boss attacks
    if(boss.atkT%70===0){
      const bx=boss.x+32,by=boss.y+20;
      parts.push({x:bx,y:by,vx:(P.x-boss.x)>0?3.5:-3.5,vy:-0.5,l:2.5,s:10,c:'#7B1FA2',orb:true});
      if(boss.phase>=1&&boss.atkT%140===0){
        parts.push({x:bx,y:by,vx:(P.x-boss.x)>0?2:-2,vy:-2,l:2.5,s:8,c:'#9C27B0',orb:true});
        parts.push({x:bx,y:by,vx:(P.x-boss.x)>0?4:-4,vy:1,l:2.5,s:8,c:'#9C27B0',orb:true});
      }
    }
    // Phase 3: Ground pound attack (final boss only, lv===8)
    if(boss.phase>=2){
      if(boss.gpT>0)boss.gpT--;
      if(boss.atkT%120===0&&boss.gpT<=0){
        boss.gpT=40;boss.gpShock=0;
      }
      if(boss.gpT>20){boss.y=440-(boss.gpT-20)*3}// rising
      else if(boss.gpT===20){boss.y=440;boss.gpShock=30;shakeT=12;sfxBossHit();
        // Shockwave particles
        for(let i=0;i<16;i++)parts.push({x:boss.x+45,y:500,vx:(i-8)*2.5,vy:-Math.random()*2,l:1.5,s:rng(4,8),c:'#FF0040'});
      }
      else if(boss.gpT>0&&boss.gpT<20){boss.y=440}
      // Shockwave damage
      if(boss.gpShock>0){boss.gpShock--;
        if(P.gr&&Math.abs(P.x+PW/2-boss.x-45)<180){
          if(P.invincT<=0&&P.shieldT<=0&&hatchuShield){hatchuShield=false;P.vy=jmp*0.6;sfxDamage()}
          else if(P.invincT<=0&&P.shieldT<=0&&!hatchuShield){npcMsg='다시 도전!';npcT=180;setTimeout(()=>{initLv(lv);scr='play'},800)}
          else if(P.shieldT>0){P.shieldT=0;P.vy=jmp*0.4;sfxDamage()}
        }
      }
      // Spawn minion orbs every 200 ticks in phase 3
      if(boss.atkT%200===0){
        const mx2=boss.x+45;
        boss.minions.push({x:mx2,y:450,vx:rng(-2,2)||1,vy:-3,gr:false,alive:true});
      }
    }
    // Update minions
    if(boss.minions){boss.minions.forEach(m=>{if(!m.alive)return;
      m.vy+=0.25;m.x+=m.vx;m.y+=m.vy;
      // Bounce off ground
      if(m.y>=500){m.y=500;m.vy=-4}
      // Bounce off edges
      if(m.x<LEVELS[lv].endX-350||m.x>LEVELS[lv].endX-30)m.vx=-m.vx;
      // Collision with player
      if(Math.abs(P.x+PW/2-m.x)<20&&Math.abs(P.y+PH/2-m.y)<20){
        if(P.invincT>0){m.alive=false;hts+=1;sfxEnemyHit()}
        else if(P.vy>0&&P.y+PH<m.y+5){m.alive=false;P.vy=jmp*0.5;hts+=1;sfxEnemyHit()}
        else if(P.shieldT>0){P.shieldT=0;sfxDamage()}
        else if(hatchuShield){hatchuShield=false;P.vy=jmp*0.3;sfxDamage()}
        else{npcMsg='다시 도전!';npcT=180;setTimeout(()=>{initLv(lv);scr='play'},800)}
      }
    });boss.minions=boss.minions.filter(m=>m.alive)}
    // Boss collision
    if(Math.abs(P.x+PW/2-boss.x-32)<45&&Math.abs(P.y+PH-boss.y-40)<45){
      if(P.vy>0&&P.y+PH<boss.y+15){boss.hp--;P.vy=jmp*0.7;sfxBossHit();
        for(let i=0;i<10;i++)parts.push({x:boss.x+32,y:boss.y,vx:(Math.random()-0.5)*6,vy:-Math.random()*5,l:1,s:rng(4,8),c:'#9C27B0'});
        if(boss.hp<=0){boss.active=false;lvDone=true;lvDoneT=90;sfxLevelClear()}}
      else if(P.invincT>0){boss.hp--;sfxBossHit();if(boss.hp<=0){boss.active=false;lvDone=true;lvDoneT=90;sfxLevelClear()}}
      else if(P.shieldT>0){P.shieldT=0;P.vy=jmp*0.5;P.x-=50;sfxDamage();}
      else if(hatchuShield){hatchuShield=false;P.vy=jmp*0.5;P.x-=50;sfxDamage();
        npcMsg='하츄핑이 대신 맞았어!\n한 번 더 맞으면 다시!';npcT=240;}
      else{npcMsg='다시 도전해보자!';npcT=180;setTimeout(()=>{initLv(lv);scr='play'},800)}}
    // Orb collision
    parts.forEach(p=>{if(!p.orb)return;
      if(Math.abs(P.x+PW/2-p.x)<20&&Math.abs(P.y+PH/2-p.y)<25){p.l=0;
        if(P.invincT>0)return;
        if(P.shieldT>0){P.shieldT=0;sfxDamage();return}
        if(hatchuShield){hatchuShield=false;P.vy=jmp*0.3;sfxDamage();}
        else{npcMsg='다시 도전!';npcT=180;setTimeout(()=>{initLv(lv);scr='play'},800)}}});
  }
  if(!L.boss&&P.x>=L.endX-50){lvDone=true;lvDoneT=90;sfxLevelClear()}
  // Particles
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(!p.orb)p.vy+=0.1;p.l-=0.025});parts=parts.filter(p=>p.l>0);if(parts.length>300)parts=parts.slice(-300);
  if(P.gr&&Math.abs(P.vx)>1&&Math.random()<0.3)parts.push({x:P.x+PW/2,y:P.y+PH,vx:(Math.random()-0.5),vy:-Math.random()*0.8,l:0.4,s:rng(2,3),c:'rgba(150,140,120,0.4)'});
}

function die(){if(P.dead)return;P.dead=true;lives--;combo=0;comboT=0;sfxDamage();
  for(let i=0;i<12;i++)parts.push({x:P.x+PW/2,y:P.y+PH/2,vx:(Math.random()-0.5)*6,vy:-Math.random()*5-2,l:1,s:rng(3,7),c:'#FF6B9D'});
  setTimeout(()=>{if(lives<=0){doTrans('gameover')}else{
    const hadCheckpoint=checkpoint&&checkpoint.reached;
    const cpX=hadCheckpoint?checkpoint.x:null;
    const cpY=hadCheckpoint?checkpoint.y-PH+40:null;
    initLv(lv);
    if(hadCheckpoint&&cpX!=null){P.x=cpX;P.y=cpY;checkpoint.reached=true}
    doTrans('play')}},1200)}

function onClear(){
  saveProgress();
  if(lv===2){// end of world 1 - show double jump + wall slide tutorial
    goStory(ST_W2.concat(ST_W3),()=>{lv=3;initLv(3);doTrans('play')});
  }else if(lv===5){// end of world 2
    goStory(ST_W4,()=>{lv=6;initLv(6);doTrans('play')});
  }else if(lv===8){// end of world 3 final boss - go to bonus
    goStory(ST_BONUS,()=>{lv=9;initLv(9);doTrans('play')});
  }else if(lv===9){// bonus level complete - real ending
    goStory(ST_END,()=>doTrans('ending'));
  }else if(LEVELS[lv+1]&&LEVELS[lv+1].boss){
    const stories=[null,null,ST_BOSS1,null,null,ST_BOSS2,null,ST_BOSS3,null,null];
    const st=stories[lv];
    if(st)goStory(st,()=>{lv++;initLv(lv);doTrans('play')});
    else{lv++;initLv(lv);doTrans('play')}
  }else{lv++;initLv(lv);doTrans('play')}
}

  if(scr==='play')updatePlay();
}

      const unlocked=i===0||cleared||(sd.cleared||[]).includes(i-1);
      rr(X,bx,by,125,80,12,unlocked?(cleared?'rgba(76,175,80,0.5)':'rgba(255,107,157,0.4)'):'rgba(100,100,100,0.4)',cleared?'#4CAF50':'rgba(255,255,255,0.3)');
      X.fillStyle=unlocked?'#fff':'#888';X.font='bold '+FN(14);X.textAlign='center';X.fillText(L.name,bx+62,by+30);
      if(L.boss){X.fillStyle='#FF6B9D';X.font=FN(11);X.fillText('BOSS',bx+62,by+50)}
      if(cleared){X.fillStyle='#FFD700';X.font=FN(14);X.fillText('CLEAR',bx+62,by+65)}
      if(unlocked)btns.push({x:bx,y:by,w:125,h:80,id:'lv'+i});
    });
    btns.push({x:10,y:H-50,w:100,h:40,id:'back'});
    rr(X,10,H-50,100,40,16,'rgba(255,255,255,0.2)');X.fillStyle='#fff';X.font=FN(14);X.textAlign='center';X.fillText('뒤로',60,H-24);
  }
  else if(scr==='story'){
    const s=stQ[stI];if(!s)return;drawEnvBG(s.bg);if(s.img)drawCharSprite(s.img);drawGlassPanel(s);btns=[];
  }
  else if(scr==='play'){
    const L=LEVELS[lv];if(!L)return;drawPlayBG(L.bg);
    L.plat.forEach(drawPlat);
    // Items (hearts)
    items_l.forEach(it=>{if(!it[3])return;const sx=it[0]-camX,sy=it[1]+sin(t*2.4+it[0])*4;if(sx<-15||sx>W+15)return;heart(X,sx,sy,9,'#FF6B9D')});
    // Stars
    stars_l.forEach(st=>{if(!st[3])return;const sx=st[0]-camX,sy=st[1]+sin(t*3+st[0])*3;if(sx<-15||sx>W+15)return;
      X.save();X.translate(sx,sy);X.rotate(t);star(X,0,0,8,'#FFD700');X.restore();X.fillStyle='rgba(255,215,0,0.3)';X.beginPath();X.arc(sx,sy,12,0,Math.PI*2);X.fill()});
    // Powerups
    powerups_l.forEach(pu=>{if(!pu[3])return;const sx=pu[0]-camX,sy=pu[1]+sin(t*2+pu[0])*5;if(sx<-15||sx>W+15)return;
      X.fillStyle=PU_COLORS[pu[2]];X.beginPath();X.arc(sx,sy,12,0,Math.PI*2);X.fill();X.fillStyle='rgba(255,255,255,0.6)';X.beginPath();X.arc(sx-3,sy-3,4,0,Math.PI*2);X.fill();
      X.strokeStyle='rgba(255,255,255,0.5)';X.lineWidth=2;X.beginPath();X.arc(sx,sy,14+sin(t*3)*2,0,Math.PI*2);X.stroke()});
    // NPCs
    npcs_l.forEach(n=>{const sx=n.x-camX;if(sx<-50||sx>W+50)return;const img=n.spr==='ba'?IM.ba:IM.ch;if(img)X.drawImage(img,sx-25,n.y-25,55,55);if(!n.done){X.fillStyle='#FFD700';X.font='bold '+FN(16);X.textAlign='center';X.fillText('!',sx+5,n.y-35)}});
    enemies_l.forEach(drawEnemy);
    // Boss
    if(boss.active&&boss.hp>0){const sx=boss.x-camX,bob=sin(t*3.3)*6;
      if(IM.ts)X.drawImage(IM.ts,sx,boss.y+bob,90,80);
      rr(X,sx,boss.y-18,90,10,4,'rgba(0,0,0,0.6)');rr(X,sx+2,boss.y-16,(boss.hp/boss.mx)*86,6,3,'#FF0040');
      X.fillStyle='#fff';X.font=FN(12);X.textAlign='center';X.fillText('트러핑',sx+45,boss.y-22)}
    drawPlayer();
    parts.forEach(p=>{X.globalAlpha=p.l;X.fillStyle=p.c;X.beginPath();X.arc(p.x-camX,p.y,p.s*p.l,0,Math.PI*2);X.fill()});X.globalAlpha=1;
    // HUD
    rr(X,8,8,W-16,36,12,'rgba(0,0,0,0.7)');
    X.fillStyle='#fff';X.font=FN(13);X.textAlign='left';
    X.fillText('x'+lives,16,30);
    heart(X,70,24,6,'#FF6B9D');X.fillText(hts+'',82,30);
    star(X,120,24,5,'#FFD700');X.fillText(starCount+'',132,30);
    X.fillStyle='rgba(255,255,255,0.7)';X.font=FN(11);X.textAlign='right';X.fillText(LEVELS[lv].name+' W'+LEVELS[lv].world,W-16,28);
    // Level progress bar
    const prog=clamp((P.x)/(LEVELS[lv].endX-50),0,1);
    rr(X,60,16,W-120,6,3,'rgba(255,255,255,0.15)');
    rr(X,60,16,(W-120)*prog,6,3,'#FF6B9D');
    // Active powerups
    let puY=50;
    if(P.shieldT>0){rr(X,8,puY,90,20,8,'rgba(79,195,247,0.6)');X.fillStyle='#fff';X.font=FN(10);X.textAlign='left';X.fillText('보호막 '+Math.ceil(P.shieldT/60)+'s',14,puY+14);puY+=24}
    if(P.speedT>0){rr(X,8,puY,90,20,8,'rgba(118,255,3,0.6)');X.fillStyle='#fff';X.font=FN(10);X.textAlign='left';X.fillText('스피드 '+Math.ceil(P.speedT/60)+'s',14,puY+14);puY+=24}
    if(P.invincT>0){rr(X,8,puY,90,20,8,'rgba(255,215,0,0.6)');X.fillStyle='#fff';X.font=FN(10);X.textAlign='left';X.fillText('무적 '+Math.ceil(P.invincT/60)+'s',14,puY+14);puY+=24}
    if(P.magnetT>0){rr(X,8,puY,90,20,8,'rgba(224,64,251,0.6)');X.fillStyle='#fff';X.font=FN(10);X.textAlign='left';X.fillText('자석 '+Math.ceil(P.magnetT/60)+'s',14,puY+14)}
    // Companion
    if(LEVELS[lv].boss&&!P.dead){const hx=P.x-camX+PW/2+8,hy=P.y-15+sin(t*3)*5;if(IM.hs){X.globalAlpha=hatchuShield?1:0.3;X.drawImage(IM.hs,hx-20,hy-18,40,35);X.globalAlpha=1}}
    if(npcMsg&&npcT>0){rr(X,20,H-220,W-40,60,12,'rgba(0,0,0,0.88)');X.fillStyle='#fff';X.font=FN(14);X.textAlign='center';npcMsg.split('\n').forEach((l,i)=>X.fillText(l,W/2,H-200+i*22))}
    drawTouchControls();
    if(lvDone){X.fillStyle=`rgba(255,255,255,${0.2+sin(t*5.6)*0.15})`;X.fillRect(0,0,W,H);X.fillStyle='#C2185B';X.font='bold '+FN(22);X.textAlign='center';X.fillText('스테이지 클리어!',W/2,H/2)}
    // Mute/Pause
    btns=[{x:W-42,y:50,w:36,h:28,id:'mute'},{x:W-42,y:82,w:36,h:28,id:'pause'}];
    rr(X,W-42,50,36,28,10,'rgba(0,0,0,0.5)');X.fillStyle='#fff';X.font=FN(16);X.textAlign='center';X.fillText(_mute?'M':'S',W-24,68);
    rr(X,W-42,82,36,28,10,'rgba(0,0,0,0.5)');X.fillStyle='#fff';X.font=FN(14);X.textAlign='center';X.fillText('||',W-24,100);
  }
  else if(scr==='ending'){
    drawEnvBG('bg_fountain');X.fillStyle='rgba(255,182,193,0.15)';X.fillRect(0,0,W,H);
    const hs2=1+sin(t*3)*0.06;X.save();X.translate(W/2,80);X.scale(hs2,hs2);heart(X,0,0,42,'#FF6B9D');X.restore();
    X.save();X.shadowColor='rgba(0,0,0,0.5)';X.shadowBlur=4;X.fillStyle='#C2185B';X.font='bold '+FN(26);X.textAlign='center';X.fillText('게임 클리어!',W/2,160);
    X.fillStyle='#fff';X.font=FN(15);
    ['로미와 하츄핑은 사랑의 힘으로','모든 어둠을 물리쳤어요!','','트러핑도 오해를 풀고','행복해졌습니다!','','너무 잘했어! 최고야!'].forEach((l,i)=>X.fillText(l,W/2,200+i*24));
    X.restore();
    X.fillStyle='#FFD700';X.font='bold '+FN(16);X.textAlign='center';
    X.fillText('하트 '+hts+'개 / 별 '+starCount+'개 수집!',W/2,400);
    if(IM.rp){const im=IM.rp;const ch=180;const cw=im.width*(ch/im.height);X.drawImage(im,20,420+sin(t*1.5)*5,cw,ch)}
    if(IM.hp){const im=IM.hp;const ch=110;const cw=im.width*(ch/im.height);X.drawImage(im,W/2+30,480+sin(t*1.5+1)*5,cw,ch)}
    btns=[{x:W/2-55,y:650,w:110,h:38,id:'restart'}];
    rr(X,btns[0].x,btns[0].y,110,38,16,'#E84B7A');X.fillStyle='#fff';X.font=FN(14);X.textAlign='center';X.fillText('다시 하기',W/2,675);
  }
  else if(scr==='gameover'){
    drawEnvBG('bg_forest_dk');X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(0,0,W,H);
    X.fillStyle='#fff';X.font='bold '+FN(24);X.textAlign='center';X.fillText('앗! 넘어졌어!',W/2,H/2-80);
    X.fillStyle='rgba(255,255,255,0.8)';X.font=FN(16);X.fillText('괜찮아! 다시 해보자!',W/2,H/2-40);
    X.fillStyle='#FFD700';X.font=FN(14);X.fillText('하트 '+hts+'개 / 별 '+starCount+'개',W/2,H/2);
    btns=[{x:W/2-70,y:H/2+30,w:140,h:44,id:'retry'},{x:W/2-70,y:H/2+90,w:140,h:44,id:'go_title'}];
    rr(X,btns[0].x,btns[0].y,140,44,20,'#FF6B9D');X.fillStyle='#fff';X.font='bold '+FN(16);X.textAlign='center';X.fillText('다시 도전!',W/2,H/2+58);
    rr(X,btns[1].x,btns[1].y,140,44,20,'#7B1FA2');X.fillStyle='#fff';X.font='bold '+FN(16);X.fillText('처음으로',W/2,H/2+118);
  }
  // Transition (circular wipe)
  if(trA>0){
    if(trCircle){
      const maxR=Math.sqrt((W/2)*(W/2)+(H/2)*(H/2))+20;
      const r=maxR*(1-trA);
      X.save();X.fillStyle='#000';X.beginPath();X.rect(0,0,W,H);X.arc(W/2,H/2,Math.max(0,r),0,Math.PI*2,true);X.fill();X.restore();
    }else{X.fillStyle=`rgba(0,0,0,${trA})`;X.fillRect(0,0,W,H)}
  }
  // Pause overlay
  if(paused&&scr==='play'){X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(0,0,W,H);X.fillStyle='#fff';X.font='bold '+FN(28);X.textAlign='center';X.fillText('일시정지',W/2,H/2-30);
    rr(X,W/2-70,H/2,140,44,20,'#FF6B9D');X.fillStyle='#fff';X.font='bold '+FN(18);X.textAlign='center';X.fillText('계속하기',W/2,H/2+28);
    btns=[{x:W/2-70,y:H/2,w:140,h:44,id:'resume'}]}
}

// ===== INPUT =====
let _cachedRect=C.getBoundingClientRect();
window.addEventListener('resize',()=>{_cachedRect=C.getBoundingClientRect()});
document.addEventListener('keydown',e=>{keys[e.key]=true;
  if(e.key==='Escape'){if(scr==='play'){paused=!paused}return}
  if(paused)return;
  if(scr==='story'&&(e.key===' '||e.key==='Enter'))advSt();
});
document.addEventListener('keyup',e=>{keys[e.key]=false});
function gp(e){const r=_cachedRect;const t2=e.changedTouches?e.changedTouches[0]:e;return{x:(t2.clientX-r.left)*(W/r.width),y:(t2.clientY-r.top)*(H/r.height)}}
function inR(p,r){return p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h}
function inC(p,cx,cy,r){return(p.x-cx)**2+(p.y-cy)**2<=r*r}

function onDown(e){e.preventDefault();_initAudio();const p=gp(e);
  if(paused){btns.forEach(b=>{if(inR(p,b)&&b.id==='resume'){paused=false}});return}
  if(trA>0.3)return;
  // Button handling
  for(const b of btns){if(!inR(p,b))continue;
    if(b.id==='mute'){_mute=!_mute;sfxClick();return}
    if(b.id==='pause'){paused=true;return}
    if(b.id==='charsel'){scr='charsel';sfxClick();return}
    if(b.id==='lvselect'){scr='lvselect';sfxClick();return}
    if(b.id==='back'){scr='title';sfxClick();return}
    if(b.id==='startgame'){
      chosenChar=CHARACTERS[selChar];lives=7;hts=0;starCount=0;lv=0;
      goStory(ST_OPEN,()=>{initLv(0);doTrans('play')});sfxClick();return}
    if(b.id&&b.id.startsWith('char')){selChar=parseInt(b.id.slice(4));sfxClick();return}
    if(b.id&&b.id.startsWith('lv')){
      const lvNum=parseInt(b.id.slice(2));chosenChar=CHARACTERS[selChar];lives=7;hts=0;starCount=0;lv=lvNum;
      initLv(lvNum);doTrans('play');sfxClick();return}
    if(b.id==='restart'){location.reload();return}
    if(b.id==='retry'){lives=7;hts=0;starCount=0;initLv(lv);doTrans('play');sfxClick();return}
    if(b.id==='go_title'){scr='title';sfxClick();return}
  }
  if(scr==='story'){advSt();sfxClick();return}
  if(scr==='play'){
    if(inC(p,55,H-60,42))tL=true;
    if(inC(p,140,H-60,42))tR=true;
    if(inC(p,W-60,H-60,50))tJ=true;
    if(hasDash&&inC(p,W-60,H-130,35))tDash=true;
  }
}
function onUp(e){e.preventDefault();tL=false;tR=false;tJ=false;tDash=false}
function onMove(e){e.preventDefault();if(scr!=='play')return;
  tL=false;tR=false;tJ=false;tDash=false;
  for(const t2 of(e.touches||[e])){const r=_cachedRect;
    const p={x:(t2.clientX-r.left)*(W/r.width),y:(t2.clientY-r.top)*(H/r.height)};
    if(inC(p,55,H-60,42))tL=true;if(inC(p,140,H-60,42))tR=true;if(inC(p,W-60,H-60,50))tJ=true;
    if(hasDash&&inC(p,W-60,H-130,35))tDash=true;
  }}
C.addEventListener('mousedown',onDown);C.addEventListener('mouseup',onUp);
C.addEventListener('touchstart',onDown,{passive:false});C.addEventListener('touchend',onUp,{passive:false});
C.addEventListener('touchmove',onMove,{passive:false});

// ===== GAME LOOP =====
function loop(){if(!paused){update();render()}else{render()}requestAnimationFrame(loop)}
function wait(){
  if(iL<iT){X.fillStyle='#1a0a2e';X.fillRect(0,0,W,H);X.fillStyle='#FF6B9D';X.font=FN(16);X.textAlign='center';X.fillText('로딩 중...',W/2,H/2);
    rr(X,W/4,H/2+20,W/2,8,4,'rgba(255,255,255,0.25)');rr(X,W/4,H/2+20,W/2*(iL/iT),8,4,'#FF6B9D');requestAnimationFrame(wait)}
  else requestAnimationFrame(loop)}
wait();
</script>
